<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carrom Physics Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2b0050;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }

  #game-container {
    position: relative;
    width: 520px;
    height: 520px;
  }

  canvas {
    border-radius: 26px;
    display: block;
  }

  /* Overlay UI for 3D frame look */
  .board-frame {
    pointer-events: none;
    position: absolute;
    inset: 0;
    border-radius: 26px;
    box-shadow:
      0 14px 24px rgba(0,0,0,0.5),
      0 4px 0 #8a4a2a,
      inset 0 0 0 12px #b55a3b,
      inset 0 0 0 22px #ffffff,
      inset 0 0 0 32px #b55a3b;
  }
</style>
</head>

<body>
<div id="game-container">
  <canvas id="world" width="520" height="520"></canvas>
  <div class="board-frame"></div>
</div>

<!-- Matter.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
  const {
    Engine,
    Render,
    Runner,
    World,
    Bodies,
    Body,
    Constraint,
    Mouse,
    MouseConstraint,
    Events,
    Composite,
    Vector
  } = Matter;

  const width = 520;
  const height = 520;
  const center = { x: width / 2, y: height / 2 };

  // Engine & world
  const engine = Engine.create();
  const world = engine.world;
  world.gravity.y = 0;

  // Canvas render
  const canvas = document.getElementById('world');
  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      width,
      height,
      wireframes: false,
      background: '#f4d7a1'
    }
  });

  Render.run(render);
  const runner = Runner.create();
  Runner.run(runner, engine);

  // Board walls (slightly inset)
  const wallThickness = 30;
  const inset = 40;

  const walls = [
    Bodies.rectangle(width / 2, inset, width - inset * 2, 10, { isStatic: true, restitution: 0.8 }),
    Bodies.rectangle(width / 2, height - inset, width - inset * 2, 10, { isStatic: true, restitution: 0.8 }),
    Bodies.rectangle(inset, height / 2, 10, height - inset * 2, { isStatic: true, restitution: 0.8 }),
    Bodies.rectangle(width - inset, height / 2, 10, height - inset * 2, { isStatic: true, restitution: 0.8 })
  ];
  World.add(world, walls);

  // Pockets (just visual, not removing coins yet)
  const pockets = [
    { x: inset, y: inset },
    { x: width - inset, y: inset },
    { x: inset, y: height - inset },
    { x: width - inset, y: height - inset }
  ];

  // Coin settings
  const coinRadius = 12;
  const strikerRadius = 16;

  function makeCoin(x, y, colorType) {
    const baseOptions = {
      restitution: 0.9,
      friction: 0.02,
      frictionAir: 0.01,
      density: 0.002
    };
    let renderStyle;
    if (colorType === 'white') {
      renderStyle = {
        fillStyle: '#ffffff',
        strokeStyle: '#555555',
        lineWidth: 2
      };
    } else if (colorType === 'black') {
      renderStyle = {
        fillStyle: '#111111',
        strokeStyle: '#eeeeee',
        lineWidth: 2
      };
    } else if (colorType === 'red') {
      renderStyle = {
        fillStyle: '#c0182b',
        strokeStyle: '#5a000a',
        lineWidth: 2
      };
    }

    return Bodies.circle(x, y, coinRadius, {
      ...baseOptions,
      render: renderStyle
    });
  }

  // Arrange coins: inner + outer ring (white + black + red queen)
  const coins = [];

  // Queen
  coins.push(makeCoin(center.x, center.y, 'red'));

  // Inner ring (white)
  const innerR = 32;
  const innerAngles = [ -90, -30, 30, 90, 150, 210 ];
  innerAngles.forEach(a => {
    const rad = a * Math.PI / 180;
    coins.push(makeCoin(center.x + innerR * Math.cos(rad), center.y + innerR * Math.sin(rad), 'white'));
  });

  // Outer ring (black)
  const outerR = 60;
  const outerAngles = [ -90, -30, 30, 90, 150, 210 ];
  outerAngles.forEach(a => {
    const rad = a * Math.PI / 180;
    coins.push(makeCoin(center.x + outerR * Math.cos(rad), center.y + outerR * Math.sin(rad), 'black'));
  });

  World.add(world, coins);

  // Striker at bottom center
  const strikerStart = { x: center.x, y: height - 80 };
  const striker = Bodies.circle(strikerStart.x, strikerStart.y, strikerRadius, {
    restitution: 0.95,
    friction: 0.01,
    frictionAir: 0.01,
    density: 0.004,
    render: {
      fillStyle: '#7b2cff',
      strokeStyle: '#ffffff',
      lineWidth: 3
    }
  });
  World.add(world, striker);

  // Mouse control for aiming
  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse,
    constraint: {
      stiffness: 0.02,
      render: { visible: false }
    }
  });
  World.add(world, mouseConstraint);

  // Custom drag-to-aim + shoot
  let isDraggingStriker = false;
  let dragStart = null;

  // Only allow dragging striker, not coins
  Events.on(mouseConstraint, 'mousedown', function(event) {
    const mousePos = event.mouse.position;
    const dist = Vector.magnitude(Vector.sub(mousePos, striker.position));
    if (dist <= strikerRadius + 5) {
      isDraggingStriker = true;
      dragStart = { x: striker.position.x, y: striker.position.y };
      Body.setVelocity(striker, { x: 0, y: 0 });
      Body.setAngularVelocity(striker, 0);
    }
  });

  Events.on(mouseConstraint, 'mouseup', function(event) {
    if (!isDraggingStriker) return;
    isDraggingStriker = false;

    const mousePos = event.mouse.position;
    const dragVector = Vector.sub(dragStart, mousePos); // pull back to shoot
    const strength = 0.03; // tweak power here
    const impulse = Vector.mult(dragVector, strength);

    Body.applyForce(striker, striker.position, impulse);
  });

  // Keep striker within board
  Events.on(engine, 'beforeUpdate', function() {
    if (isDraggingStriker && mouse.position) {
      // Show striker following mouse but clamped to a line near bottom
      const clampY = height - 80;
      const clampX = Math.max(inset + 40, Math.min(width - inset - 40, mouse.position.x));
      Body.setPosition(striker, { x: clampX, y: clampY });
    }
  });

  // Custom rendering overlay (arrows, star, pockets glow, striker glow)
  const context = render.context;

  Events.on(render, 'afterRender', function() {
    // Draw pockets
    context.save();
    pockets.forEach(p => {
      context.beginPath();
      context.fillStyle = '#000000';
      context.arc(p.x, p.y, 24, 0, Math.PI * 2);
      context.fill();
    });

    // Center circle
    context.beginPath();
    context.strokeStyle = '#b54a3b';
    context.lineWidth = 5;
    context.arc(center.x, center.y, 100, 0, Math.PI * 2);
    context.stroke();

    // Star
    context.fillStyle = '#c0182b';
    drawStar(context, center.x, center.y, 5, 20, 8);

    // Arrow rings + tips (full circle with arrow)
    context.strokeStyle = 'rgba(180,60,40,0.9)';
    context.lineWidth = 3;

    const ringR = 40;
    const arrowOffset = 70;

    // Top
    drawArrowRing(context, center.x, center.y - arrowOffset, ringR, 'top');
    // Bottom
    drawArrowRing(context, center.x, center.y + arrowOffset, ringR, 'bottom');
    // Left
    drawArrowRing(context, center.x - arrowOffset, center.y, ringR, 'left');
    // Right
    drawArrowRing(context, center.x + arrowOffset, center.y, ringR, 'right');

    // Striker glow
    context.beginPath();
    const s = striker.position;
    const gradient = context.createRadialGradient(s.x, s.y, 10, s.x, s.y, 45);
    gradient.addColorStop(0, 'rgba(255,140,0,0.9)');
    gradient.addColorStop(1, 'rgba(255,140,0,0)');
    context.fillStyle = gradient;
    context.arc(s.x, s.y, 45, 0, Math.PI * 2);
    context.fill();

    context.restore();
  });

  function drawStar(ctx, x, y, points, outerRadius, innerRadius) {
    let angle = Math.PI / 2 * 3;
    let step = Math.PI / points;

    ctx.beginPath();
    ctx.moveTo(x, y - outerRadius);
    for (let i = 0; i < points; i++) {
      ctx.lineTo(x + Math.cos(angle) * outerRadius, y + Math.sin(angle) * outerRadius);
      angle += step;
      ctx.lineTo(x + Math.cos(angle) * innerRadius, y + Math.sin(angle) * innerRadius);
      angle += step;
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawArrowRing(ctx, x, y, r, dir) {
    // Ring
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();

    // Arrow tip
    ctx.beginPath();
    ctx.fillStyle = 'rgba(180,60,40,0.9)';
    const size = 8;

    if (dir === 'top') {
      ctx.moveTo(x, y - r - size);
      ctx.lineTo(x - size, y - r + 2);
      ctx.lineTo(x + size, y - r + 2);
    } else if (dir === 'bottom') {
      ctx.moveTo(x, y + r + size);
      ctx.lineTo(x - size, y + r - 2);
      ctx.lineTo(x + size, y + r - 2);
    } else if (dir === 'left') {
      ctx.moveTo(x - r - size, y);
      ctx.lineTo(x - r + 2, y - size);
      ctx.lineTo(x - r + 2, y + size);
    } else if (dir === 'right') {
      ctx.moveTo(x + r + size, y);
      ctx.lineTo(x + r - 2, y - size);
      ctx.lineTo(x + r - 2, y + size);
    }
    ctx.closePath();
    ctx.fill();
  }
</script>
</body>
</html>
