    #setupScreen {

<!-- SETUP SCREEN -->
<div id="setupScreen">
    <div class="setup-card">
        <div class="success-icon">👋</div>
        <h1>Fazil-faz</h1>
        <p>Free Video Calls with Friends</p>

        <div id="createSection">
            <button class="btn-setup" onclick="generateRoomCode()">📱 Create Room</button>
            <div class="divider">OR</div>
            <input type="text" id="roomCodeInput" class="room-input" placeholder="Enter Room Code">
            <button class="btn-setup" onclick="joinWithCode()">🔗 Join Room</button>
        </div>

        <div id="roomInfo" class="hidden">
            <div class="success-icon">✅</div>
            <div class="room-display">
                <p style="margin-bottom: 10px; font-size: 0.95rem;">Your Room Code:</p>
                <div class="room-code" id="displayCode"></div>
                <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 15px;">Share this with your friend</p>
            </div>

            <div class="share-link-box">
                <small>📎 Share This Link:</small><br><br>
                <span id="shareLink" style="word-break: break-all; font-size: 0.95rem; font-weight: bold;"></span>
            </div>

            <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            <button class="btn-setup" onclick="startCall()" style="margin-top: 10px;">✅ Start Call</button>
        </div>

        <p id="connectionStatus" class="status-text"></p>
    </div>
</div>

<!-- JITSI MEET CONTAINER -->
<div id="jitsiContainer"></div>

<script>
    let currentRoom = null;
    let isRoomCreator = false;

    function log(msg) {
        console.log('[FAZIL-FAZ] ' + msg);
        document.getElementById('connectionStatus').innerText = msg;
    }

    // CHECK IF JOINING VIA LINK
    function checkJoinLink() {
        const params = new URLSearchParams(window.location.search);
        const roomFromURL = params.get('room');
        
        if (roomFromURL) {
            currentRoom = roomFromURL.toLowerCase().replace(/[^a-z0-9-]/g, '');
            isRoomCreator = false;
            log('Joining room: ' + currentRoom);
            startCall();
            return true;
        }
        return false;
    }

    function generateRoomCode() {
        // Generate a simple, easy-to-share room code
        currentRoom = 'room' + Math.random().toString(36).substr(2, 8).toUpperCase();
        isRoomCreator = true;
        
        const baseURL = window.location.origin + window.location.pathname;
        const shareURL = baseURL + '?room=' + currentRoom;
        
        document.getElementById('displayCode').innerText = currentRoom;
        document.getElementById('shareLink').innerText = shareURL;
        
        document.getElementById('createSection').classList.add('hidden');
        document.getElementById('roomInfo').classList.remove('hidden');
        
        log('Room created: ' + currentRoom);
    }

    function joinWithCode() {
        const code = document.getElementById('roomCodeInput').value.trim();
        if (!code) {
            alert('Please enter a room code');
            return;
        }
        currentRoom = code.toLowerCase().replace(/[^a-z0-9-]/g, '');
        isRoomCreator = false;
        startCall();
    }

    function copyLink() {
        const link = document.getElementById('shareLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            alert('✅ Link copied to clipboard!\nShare with your friend now');
        }).catch(() => {
            alert('Could not copy automatically. Please copy manually from the box above.');
        });
    }

    function startCall() {
        if (!currentRoom) {
            alert('Please create or enter a room code');
            return;
        }

        log('Connecting to room: ' + currentRoom);

        // Hide setup screen
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('jitsiContainer').classList.add('active');

        // Configure Jitsi Meet
        const options = {
            roomName: currentRoom,
            width: '100%',
            height: '100%',
            parentNode: document.getElementById('jitsiContainer'),
            configOverwrite: {
                enableWelcomePage: false,
                enableNoiseSuppression: true,
                startWithVideoMuted: false,
                startWithAudioMuted: false,
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                SHOW_BRAND_WATERMARK: false,
                HIDE_INVITE_BUTTON: true,
                MOBILE_APP_PROMO: false,
            },
            userInfo: {
                displayName: 'Fazil User'
            }
        };

        try {
            const api = new JitsiMeetExternalAPI('meet.jit.si', options);

            api.addEventListener('videoConferenceJoined', function() {
                log('✅ Successfully joined call!');
            });

            api.addEventListener('videoConferenceLeft', function() {
                log('Call ended');
                window.location.reload();
            });

            api.addEventListener('participantJoined', function(participant) {
                log('🎉 Friend joined the call!');
            });

            api.addEventListener('participantLeft', function(participant) {
                log('Friend left the call');
            });

            api.addEventListener('readyToClose', function() {
                window.location.reload();
            });

            api.addEventListener('errorOccurred', function(error) {
                log('❌ Error: ' + error.message);
            });

        } catch (err) {
            log('Error initializing call: ' + err.message);
            alert('Could not start call. Please check your internet connection.');
        }
    }

    // INIT
    if (!checkJoinLink()) {
        document.getElementById('setupScreen').classList.remove('hidden');
    }
</script>
