    /* SETUP SCREEN - JOIN/CREATE ROOM */
    #setupScreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; padding: 20px;
    }

    #setupScreen.hidden { display: none; }

    .setup-card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .setup-card h1 { font-size: 2rem; margin-bottom: 10px; }
    .setup-card p { color: rgba(255,255,255,0.8); margin-bottom: 25px; font-size: 0.95rem; }

    .room-input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 10px;
        background: rgba(255,255,255,0.1);
        color: white;
        font-size: 1rem;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .room-input::placeholder { color: rgba(255,255,255,0.5); }

    .btn-setup {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        margin-bottom: 10px;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(255,71,87,0.4);
    }

    .btn-setup:active { transform: scale(0.98); }

    .btn-secondary {
        background: rgba(255,255,255,0.2);
        border: 2px solid rgba(255,255,255,0.3);
    }

    .divider { color: rgba(255,255,255,0.5); margin: 20px 0; }

    .room-display {
        background: rgba(0,0,0,0.2);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .room-code {
        font-size: 1.8rem;
        font-weight: bold;
        letter-spacing: 2px;
        color: #4CAF50;
        margin: 10px 0;
        font-family: monospace;
    }

    .share-link-box {
        background: rgba(0,0,0,0.3);
        padding: 12px;
        border-radius: 8px;
        margin: 10px 0;
        word-break: break-all;
        font-size: 0.85rem;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .copy-btn {
        background: #4CAF50;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        width: 100%;
    }

    .copy-btn:active { transform: scale(0.98); }

    /* Welcome & End Screens */
    #welcomeScreen, #endScreen { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        text-align: center; color: white; 
    }
    
    #welcomeScreen {
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1516589187381-9df59773b0a7?auto=format&fit=crop&q=80&w=2072');
        background-size: cover;
        background-position: center;
    }

    #endScreen { background: #000; display: none; z-index: 500; }
    .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; object-fit: cover; }
    .btn-start { padding: 15px 40px; border-radius: 30px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,71,87,0.4); }

    /* Header */
    .app-header { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; background: white; z-index: 100; }
    .user-info { flex: 1; display: flex; align-items: center; }
    .user-info img { width: 38px; height: 38px; border-radius: 50%; background: #ddd; margin-right: 12px; object-fit: cover; }
    .user-info b { font-size: 16px; color: #333; }
    #callTimer { font-family: monospace; font-weight: bold; color: #666; font-size: 1rem; }

    /* Video Area */
    .main-view { flex: 1; position: relative; background: #000; overflow: hidden; }
    #friend { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    #me { width: 100px; height: 140px; position: absolute; top: 15px; right: 15px; border-radius: 12px; border: 2px solid white; z-index: 10; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .mirror { transform: scaleX(-1); }

    /* VOLUME SLIDER (Vertical) */
    .volume-control { position: absolute; bottom: 80px; left: 15px; height: 120px; display: flex; flex-direction: column; align-items: center; z-index: 20; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
    .volume-control input[type=range] { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 8px; height: 100px; cursor: pointer; }
    .volume-control input::-webkit-slider-thumb { background: var(--accent); border-radius: 50%; width: 15px; height: 15px; }

    /* Floating Controls */
    .floating-controls { position: absolute; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
    .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.25); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-off { background: var(--danger); border-color: var(--danger); }
    .btn-hangup { background: var(--danger); border: none; }

    /* Chat */
    .chat-container { padding: 12px; background: white; border-top: 1px solid #eee; z-index: 100; }
    #messagesList { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; }
    .bubble { align-self: flex-end; background: var(--accent); color: white; padding: 10px 16px; border-radius: 18px 18px 2px 18px; font-size: 14px; max-width: 75%; box-shadow: 0 2px 5px rgba(255,71,87,0.2); }
    .bubble.friend { align-self: flex-start; background: var(--chat-bg); color: #333; border-radius: 18px 18px 18px 2px; }

    .input-bar { display: flex; align-items: center; gap: 10px; background: #f1f3f8; padding: 6px 15px; border-radius: 25px; }
    input { flex: 1; border: none; background: transparent; padding: 10px 0; outline: none; }

    .hidden { display: none !important; }
</style>

<!-- SETUP SCREEN: Join or Create Room -->

        <!-- CREATE ROOM -->

<!-- WELCOME SCREEN -->
<div id="welcomeScreen" class="hidden">
    <h1 style="font-size: 2rem; margin-bottom: 5px;">Ready to Call?</h1>
    <p style="color: #eee; margin-top: 0; margin-bottom: 30px; font-size: 1rem;">Allow camera and microphone access</p>

<!-- MAIN APP -->
<div class="app-header" id="appHeader" style="display: none;">
    <div class="user-info">
        <img src="https://via.placeholder.com/150">
        <div><b>Fazil-faz</b><br><small style="color:#2ecc71; font-weight:bold;">● Online</small></div>

<script>
    let peer, conn, myStream, currentFacingMode = 'user', isMuted = false, startTime, timerInt;
    let currentRoom = null;
    const ringtone = document.getElementById('ringtone');

    // CHECK IF JOINING VIA LINK
    function checkJoinLink() {
        const params = new URLSearchParams(window.location.search);
        const roomFromURL = params.get('room');
        
        if (roomFromURL) {
            currentRoom = roomFromURL;
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            return true;
        }
        return false;
    }

    // GENERATE RANDOM ROOM CODE
    function generateRoomCode() {
        currentRoom = Math.random().toString(36).substr(2, 6).toUpperCase();
        
        const baseURL = window.location.origin + window.location.pathname;
        const shareURL = baseURL + '?room=' + currentRoom;
        
        document.getElementById('displayCode').innerText = currentRoom;
        document.getElementById('shareLink').innerText = shareURL;
        
        document.getElementById('createSection').classList.add('hidden');
        document.getElementById('roomInfo').classList.remove('hidden');
    }

    // JOIN WITH CODE
    function joinWithCode() {
        const code = document.getElementById('roomCodeInput').value.toUpperCase().trim();
        if (!code) {
            alert('Please enter a room code');
            return;
        }
        currentRoom = code;
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
    }

    // COPY LINK TO CLIPBOARD
    function copyLink() {
        const link = document.getElementById('shareLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            alert('✅ Link copied! Share with your friend');
        }).catch(() => {
            alert('Could not copy. Try selecting and copying manually.');
        });
    }

    // START CALL WITH ROOM
    function startCallWithRoom() {
        if (!currentRoom) {
            alert('No room selected');
            return;
        }
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
    }

    // 1. Unlock Audio and Start Camera
    function unlockAudioAndStart() {
        ringtone.play().then(() => {
            ringtone.pause();
            ringtone.currentTime = 0;
            document.getElementById('welcomeScreen').classList.add('hidden');
            startCamera('user'); 
        }).catch(e => {
            alert("Please click 'Allow' on the permissions dialog");
            document.getElementById('welcomeScreen').classList.add('hidden');
            startCamera('user'); 
        });
    }

    async function startCamera(facingMode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode }, 
                audio: true 
            });
            myStream = stream;
            document.getElementById('me').srcObject = myStream;
            document.getElementById('me').classList.toggle('mirror', facingMode === 'user');
            
            document.getElementById('appHeader').style.display = 'flex';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('chatContainer').style.display = 'block';
            
            initPeer();
        } catch (err) { 
            alert("Please allow camera and mic access"); 
        }
    }

    function initPeer() {
        if (!currentRoom) {
            alert('No room selected');
            return;
        }

        peer = new Peer(currentRoom, { 
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } 
        });
        
        peer.on('open', () => {
            console.log('Peer open:', currentRoom);
            
            // Try to call if not the first person
            const isInitiator = !window.location.search.includes('room=');
            if (isInitiator) {
                // Wait a moment for the other person to connect
                setTimeout(() => {
                    const call = peer.call(currentRoom, myStream);
                    call.on('stream', s => connectFriend(s));
                    setupChat(peer.connect(currentRoom));
                }, 500);
            }
        });
        
        peer.on('call', call => {
            console.log('Incoming call');
            ringtone.play();
            call.answer(myStream);
            call.on('stream', s => connectFriend(s));
        });
        
        peer.on('connection', c => {
            console.log('Chat connection');
            setupChat(c);
        });
    }

    function connectFriend(stream) {
        console.log('Friend connected');
        ringtone.pause(); 
        const fVideo = document.getElementById('friend');
        fVideo.srcObject = stream;
        fVideo.muted = false;
        fVideo.volume = 1.0;

        if (!startTime) {
            startTime = Date.now();
            timerInt = setInterval(updateTimer, 1000);
        }
    }

    function changeVolume(val) {
        const fVideo = document.getElementById('friend');
        fVideo.volume = parseFloat(val);
    }

    function updateTimer() {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(diff / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        const timeStr = `${m}:${s}`;
        document.getElementById('callTimer').innerText = timeStr;
        document.getElementById('finalTimer').innerText = timeStr;
    }

    function endCall() {
        clearInterval(timerInt);
        document.getElementById('endScreen').style.display = 'flex';
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        if (ringtone) ringtone.pause();
    }

    function switchCamera() {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        myStream.getTracks().forEach(t => t.stop());
        startCamera(currentFacingMode);
    }

    function toggleMute() {
        isMuted = !isMuted;
        myStream.getAudioTracks()[0].enabled = !isMuted;
        const btn = document.getElementById('micBtn');
        btn.innerText = isMuted ? "🔇" : "🎤";
        btn.style.background = isMuted ? "var(--danger)" : "rgba(255,255,255,0.25)";
    }

    function setupChat(c) {
        conn = c;
        conn.on('data', data => addBubble("friend", data));
    }

    function sendText() {
        const val = document.getElementById('msgInput').value;
        if (conn && val) {
            conn.send(val);
            addBubble("me", val);
            document.getElementById('msgInput').value = "";
        }
    }

    function addBubble(type, text) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        const list = document.getElementById('messagesList');
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    // INIT
    if (!checkJoinLink()) {
        // Show setup screen
        document.getElementById('setupScreen').classList.remove('hidden');
    }
</script>
