<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Carrom 3D</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#d4a532;--gold2:#f0c84a;--panel:rgba(12,8,3,0.92);--border:rgba(212,165,50,0.28)}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0704;font-family:Georgia,serif;color:#d4c9b0}
#wrap{position:absolute;inset:0}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;inset:0;pointer-events:none;z-index:4}
/* Score panels */
.sp{position:absolute;top:12px;pointer-events:auto;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:130px;box-shadow:0 4px 18px rgba(0,0,0,.6);transition:box-shadow .3s}
.sp.on{box-shadow:0 0 0 2px var(--gold),0 4px 18px rgba(212,165,50,.20)}
#spW{left:12px}#spB{right:12px}
.plbl{font-size:9px;letter-spacing:2px;opacity:.50;margin-bottom:2px;text-transform:uppercase}
.pnm{font-size:13px;font-weight:bold;letter-spacing:1px;margin-bottom:3px}
#spW .pnm{color:#f0ebe0}#spB .pnm{color:#a09888}
.snum{font-size:28px;font-weight:bold;line-height:1;color:var(--gold)}
.ssub{font-size:8px;opacity:.4;margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;max-width:115px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.wd{background:#f0ebe0}.bd{background:#555048}.qd{background:#c0392b}
/* Queen badge */
#qb{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(192,57,43,.13);border:1px solid rgba(192,57,43,.42);color:#e74c3c;font-size:10px;letter-spacing:2px;padding:5px 13px;border-radius:18px;display:none;white-space:nowrap;animation:pr 1.4s infinite}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 6px rgba(231,76,60,0)}}
/* Turn bar */
#tb{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:11px;letter-spacing:1px;display:flex;align-items:center;gap:8px;pointer-events:none;white-space:nowrap}
#td{width:8px;height:8px;border-radius:50%;transition:background .3s}
#tt{color:var(--gold)}
/* Power */
#pw{position:absolute;bottom:54px;right:12px;width:95px;pointer-events:none;display:none}
#plb{font-size:8px;letter-spacing:2px;color:var(--gold);opacity:.5;margin-bottom:3px;text-align:right}
#pbar{height:3px;border-radius:2px;background:rgba(212,165,50,.14);overflow:hidden}
#pfill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#e74c3c);border-radius:2px;transition:width .05s}
/* Controls */
#ctrl{position:absolute;bottom:12px;right:12px;pointer-events:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.cb{font-size:10px;letter-spacing:1px;padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--gold);cursor:pointer;transition:all .2s}
.cb:active,.cb:hover{background:rgba(212,165,50,.15);border-color:var(--gold)}
.cb.pr{background:rgba(212,165,50,.16);border-color:var(--gold)}
#mr{display:flex;gap:4px}
.mb{font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:5px;border:1px solid var(--border);background:var(--panel);color:#a09888;cursor:pointer;transition:all .2s}
.mb.on{color:var(--gold);border-color:var(--gold);background:rgba(212,165,50,.08)}
/* Hint & toast */
#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(212,165,50,.38);letter-spacing:1px;pointer-events:none;white-space:nowrap}
#toast{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);background:rgba(10,7,3,.94);border:1px solid var(--border);color:var(--gold2);font-size:11px;letter-spacing:1px;padding:6px 16px;border-radius:16px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
#toast.on{opacity:1}
/* Win overlay */
#win{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,5,2,.88);pointer-events:none;opacity:0;transition:opacity .4s}
#win.on{opacity:1;pointer-events:auto}
#wt{font-size:38px;font-weight:bold;color:var(--gold2);margin-bottom:5px}
#ws{font-size:13px;color:#a09888;margin-bottom:26px;letter-spacing:2px}
#wb{font-size:12px;letter-spacing:2px;padding:11px 30px;border-radius:7px;border:1px solid var(--gold);background:rgba(212,165,50,.18);color:var(--gold);cursor:pointer}
/* Error box */
#err{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a0808;border:2px solid #c0392b;color:#ff6666;padding:20px;border-radius:10px;font-size:13px;max-width:80%;text-align:center;z-index:99}
</style>
</head>
<body>
<div id="wrap"></div>
<div id="hud">
  <div class="sp on" id="spW"><div class="plbl">Player One</div><div class="pnm">WHITE</div><div class="snum" id="sW">0</div><div class="ssub">Points</div><div class="dots" id="dW"></div></div>
  <div class="sp" id="spB"><div class="plbl">Player Two</div><div class="pnm">BLACK</div><div class="snum" id="sB">0</div><div class="ssub">Points</div><div class="dots" id="dB"></div></div>
  <div id="qb">♛ COVER THE QUEEN</div>
  <div id="tb"><div id="td"></div><span id="tt">WHITE'S TURN</span></div>
  <div id="pw"><div id="plb">POWER</div><div id="pbar"><div id="pfill"></div></div></div>
  <div id="ctrl">
    <div id="mr"><button class="mb on" id="b1">1V1</button><button class="mb" id="b2">2V2</button></div>
    <button class="cb pr" id="bR">&#8635; RESET</button>
    <button class="cb" id="bF">&#8635; FLIP VIEW</button>
  </div>
  <div id="hint">TAP &amp; DRAG STRIKER · RELEASE TO SHOOT</div>

  <div id="win"><div id="wt">WHITE WINS!</div><div id="ws">GAME OVER</div><button id="wb">PLAY AGAIN</button></div>
</div>
<div id="err"></div>

<!-- Primary CDN -->

<script>
window.onerror = function(msg, src, line, col, err) {
  var box = document.getElementById('err');
  box.style.display = 'block';
  box.innerHTML = '<b>Error</b><br>' + msg + '<br>Line ' + line;

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ── If THREE failed to load, show helpful message ──────────────────────────
if (typeof THREE === 'undefined') {
  document.getElementById('err').style.display = 'block';
  document.getElementById('err').innerHTML = 'THREE.js failed to load.<br>Please check your internet connection.';
  throw new Error('THREE not loaded');
}

// ══════════════════════════════════════════════════════════════════════════
//  CONSTANTS  (r128-safe — no TorusGeometry tube issues)
// ══════════════════════════════════════════════════════════════════════════
var BS = 10, HA = 5;   // HA = half (avoid 'H' single-letter ambiguity)
var RC = 0.235, RR = 0.250, RS = 0.310, PR = 0.65;
var FRIC_C = 0.58, FRIC_V = 1.55, REST_V = 0.03;
var ELAST = 0.86, WELAST = 0.67, MAX_PWR = 14;
var SZ = 3.75, STEPS = 4, GN = 12;

var POCKETS = [
  {x: -HA+0.68, z: -HA+0.68}, {x: HA-0.68, z: -HA+0.68},
  {x: -HA+0.68, z:  HA-0.68}, {x: HA-0.68, z:  HA-0.68}
];

// ── Carrom ring layout ─────────────────────────────────────────────────────
// Inner ring: 6 coins alternating W/B at r=0.615
// Outer ring: 12 coins alternating W/B at r=1.235
// 19th white coin near centre
function makeLayout() {
  var w = [], b = [];
  var IR = 0.615, OR = 1.235;
  for (var i = 0; i < 6; i++) {
    var a = (Math.PI / 3) * i - Math.PI / 2;
    (i % 2 === 0 ? w : b).push([Math.cos(a) * IR, Math.sin(a) * IR]);
  }
  for (var i = 0; i < 12; i++) {
    var a = (Math.PI / 6) * i - Math.PI / 2 + Math.PI / 12;
    (i % 2 === 0 ? w : b).push([Math.cos(a) * OR, Math.sin(a) * OR]);
  }
  w.push([0, -IR * 0.38]);
  return {w: w, b: b};
}

// ══════════════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════════════
var scene, cam, renderer;
var coins = [], striker = null, aimLine = null, ghosts = [];
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2();
var dragging = false, ready = false, active = false, settling = false;
var turn = 'white', sW = 0, sB = 0, pW = 0, pB = 0;
var qPending = false, qBy = null, qWon = null, flipped = false;
var toastTimer = null;

// ══════════════════════════════════════════════════════════════════════════
//  COIN  (uses only CylinderGeometry + RingGeometry — no Torus needed)
// ══════════════════════════════════════════════════════════════════════════
function Coin(id, type, r, mass, x, z) {
  this.id = id; this.type = type; this.r = r; this.mass = mass;
  this.vx = 0; this.vz = 0; this.pocketed = false;

  var isSt = (type === 'striker');
  var ht   = isSt ? 0.26 : 0.18;
  var yp   = ht / 2 + 0.005;

  var COLS  = {white: 0xede6d8, black: 0x1e1a16, red: 0xcc2222, striker: 0xd4a532};
  var ROUGH = {white: .38, black: .52, red: .28, striker: .15};
  var META  = {white: .12, black: .06, red: .18, striker: .84};

  // Body
  var bodyG = new THREE.CylinderGeometry(r, r, ht, 40, 1);
  var bodyM = new THREE.MeshStandardMaterial({color: COLS[type], roughness: ROUGH[type], metalness: META[type]});
  this.mesh = new THREE.Mesh(bodyG, bodyM);
  this.mesh.castShadow = true;
  this.mesh.position.set(x, yp, z);
  scene.add(this.mesh);

  // Edge ring — use RingGeometry flat on top (much simpler than TorusGeometry)
  var ECOL = {white: 0x9a9080, black: 0x3a3530, red: 0xff5544, striker: 0xffcc00};
  var ringInner = r * 0.80, ringOuter = r * 0.98;
  var ringG = new THREE.RingGeometry(ringInner, ringOuter, 40);
  var ringM = new THREE.MeshStandardMaterial({color: ECOL[type], roughness: .22, metalness: .60, side: THREE.DoubleSide});
  var ring  = new THREE.Mesh(ringG, ringM);
  // RingGeometry lies in XY plane by default, rotate to lie flat (XZ)
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = ht * 0.501;
  this.mesh.add(ring);

  // Inner disc detail (top face)
  var ICOL = {white: 0xc0b7a4, black: 0x2a2520, red: 0xff2211};
  if (!isSt) {
    var discG = new THREE.CylinderGeometry(r * 0.50, r * 0.50, 0.005, 32);
    var discM = new THREE.MeshStandardMaterial({color: ICOL[type], roughness: .5, metalness: .08});
    var disc  = new THREE.Mesh(discG, discM);
    disc.position.y = ht * 0.5 + 0.003;
    this.mesh.add(disc);

    // Queen: gold centre dot
    if (type === 'red') {
      var dotG = new THREE.CylinderGeometry(0.052, 0.052, 0.008, 16);
      var dotM = new THREE.MeshStandardMaterial({color: 0xffd700, roughness: .18, metalness: .95});
      var dot  = new THREE.Mesh(dotG, dotM);
      dot.position.y = ht * 0.5 + 0.007;
      this.mesh.add(dot);
    }
  } else {
    // Striker: crosshair + centre dot
    var bars = [[r * 1.1, 0.008, 0.036, 0], [r * 1.1, 0.008, 0.036, Math.PI / 2]];
    for (var bi = 0; bi < bars.length; bi++) {
      var barG = new THREE.BoxGeometry(bars[bi][0], bars[bi][1], bars[bi][2]);
      var barM = new THREE.MeshStandardMaterial({color: 0xb8860b, roughness: .28, metalness: .72});
      var bar  = new THREE.Mesh(barG, barM);
      bar.position.y = ht * 0.5 + 0.004;
      bar.rotation.y = bars[bi][3];
      this.mesh.add(bar);
    }
    var cDotG = new THREE.CylinderGeometry(0.062, 0.062, 0.009, 16);
    var cDotM = new THREE.MeshStandardMaterial({color: 0xb8860b, roughness: .20, metalness: .90});
    var cDot  = new THREE.Mesh(cDotG, cDotM);
    cDot.position.y = ht * 0.5 + 0.005;
    this.mesh.add(cDot);
  }
}
Coin.prototype = {
  get x() { return this.mesh.position.x; },
  get z() { return this.mesh.position.z; },
  set x(v) { this.mesh.position.x = v; },
  set z(v) { this.mesh.position.z = v; },
  speed: function() { return Math.sqrt(this.vx * this.vx + this.vz * this.vz); },
  update: function(dt) {
    var spd = this.speed();
    if (spd < REST_V) { this.vx = 0; this.vz = 0; return; }
    var nx = this.vx / spd, nz = this.vz / spd;
    var ns = spd - FRIC_C * dt;
    ns *= Math.max(0, 1 - FRIC_V * dt);
    if (ns < 0) ns = 0;
    this.vx = nx * ns; this.vz = nz * ns;
    this.x += this.vx * dt; this.z += this.vz * dt;
  }
};

// ══════════════════════════════════════════════════════════════════════════
//  SCENE INIT
// ══════════════════════════════════════════════════════════════════════════
function initScene() {
  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('wrap').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0805);
  scene.fog = new THREE.Fog(0x0b0805, 25, 48);

  cam = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
  posCam();

  scene.add(new THREE.AmbientLight(0x3a2e1e, 1.6));
  scene.add(new THREE.HemisphereLight(0xffe8cc, 0x221100, 0.9));

  var spot = new THREE.SpotLight(0xffe8b0, 2.8, 38, Math.PI / 5, 0.45, 1.4);
  spot.position.set(0, 15, 0);
  spot.castShadow = true;
  spot.shadow.mapSize.width = 1024;
  spot.shadow.mapSize.height = 1024;
  scene.add(spot);

  var fill = new THREE.DirectionalLight(0x99aaff, 0.28);
  fill.position.set(-8, 8, 5);
  scene.add(fill);

  buildBoard();
  buildPockets();
  buildAimVis();

  var floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshStandardMaterial({color: 0x060402, roughness: 1})
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.36;
  scene.add(floor);

  spawnAll();

  window.addEventListener('resize', onResize);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerdown', onDown);
  window.addEventListener('pointerup', onUp);

  ready = true; active = true;
  updateHUD();
  requestAnimationFrame(loop);
}

function posCam() {
  if (!cam) return;
  var f = flipped ? -1 : 1;
  cam.position.set(0, 14, f * 16);
  cam.lookAt(0, 0, f * 0.4);
}

// ── Board ──────────────────────────────────────────────────────────────────
function buildBoard() {
  var surf = new THREE.Mesh(
    new THREE.BoxGeometry(BS, 0.16, BS),
    new THREE.MeshStandardMaterial({color: 0x4a7a3a, roughness: 0.84})
  );
  surf.receiveShadow = true;
  surf.position.y = 0.08;
  scene.add(surf);

  var fm = new THREE.MeshStandardMaterial({color: 0x6b3e1a, roughness: 0.70, metalness: 0.04});
  var FT = 0.50, FH = 0.52;
  var frames = [
    [BS + FT*2, FH, FT,   0,        FH/2,  HA + FT/2],
    [BS + FT*2, FH, FT,   0,        FH/2, -HA - FT/2],
    [FT,        FH, BS,   HA + FT/2, FH/2, 0],
    [FT,        FH, BS,  -HA - FT/2, FH/2, 0]
  ];
  for (var fi = 0; fi < frames.length; fi++) {
    var fw = frames[fi][0], fh = frames[fi][1], fd = frames[fi][2];
    var fx = frames[fi][3], fy = frames[fi][4], fz = frames[fi][5];
    var me = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, fd), fm);
    me.position.set(fx, fy, fz);
    me.castShadow = true;
    scene.add(me);
  }

  var base = new THREE.Mesh(
    new THREE.BoxGeometry(BS + FT*2 + 0.18, 0.30, BS + FT*2 + 0.18),
    new THREE.MeshStandardMaterial({color: 0x4a2408, roughness: 0.80, metalness: 0.02})
  );
  base.position.y = -0.15;
  base.castShadow = true;
  scene.add(base);

  // Diagonal lines
  addLine(-HA+1.1, -HA+1.1,  HA-1.1,  HA-1.1, 0x2a5828);
  addLine( HA-1.1, -HA+1.1, -HA+1.1,  HA-1.1, 0x2a5828);

  // Centre circle
  var cc = new THREE.Mesh(
    new THREE.RingGeometry(0.50, 0.58, 48),
    new THREE.MeshStandardMaterial({color: 0xcc2222, side: THREE.DoubleSide, roughness: 0.9})
  );
  cc.rotation.x = -Math.PI / 2;
  cc.position.y = 0.162;
  scene.add(cc);

  // Striker baselines
  for (var si = 0; si < 2; si++) {
    var s = si === 0 ? -1 : 1;
    var bl = new THREE.Mesh(
      new THREE.PlaneGeometry(2.4, 0.034),
      new THREE.MeshStandardMaterial({color: 0xddcc88, roughness: 1})
    );
    bl.rotation.x = -Math.PI / 2;
    bl.position.set(0, 0.162, s * SZ);
    scene.add(bl);
  }
}

function addLine(x0, z0, x1, z1, col) {
  var pts = [new THREE.Vector3(x0, 0.165, z0), new THREE.Vector3(x1, 0.165, z1)];
  var g = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({color: col})));
}

function buildPockets() {
  for (var pi = 0; pi < POCKETS.length; pi++) {
    var p = POCKETS[pi];
    var hole = new THREE.Mesh(
      new THREE.CircleGeometry(PR * 0.88, 32),
      new THREE.MeshStandardMaterial({color: 0x060402, roughness: 1})
    );
    hole.rotation.x = -Math.PI / 2;
    hole.position.set(p.x, 0.162, p.z);
    scene.add(hole);

    var rim = new THREE.Mesh(
      new THREE.RingGeometry(PR * 0.86, PR * 1.0, 32),
      new THREE.MeshStandardMaterial({color: 0xd4a532, roughness: 0.28, metalness: 0.72, side: THREE.DoubleSide})
    );
    rim.rotation.x = -Math.PI / 2;
    rim.position.set(p.x, 0.163, p.z);
    scene.add(rim);
  }
}

// ── Aim visuals ────────────────────────────────────────────────────────────
function buildAimVis() {
  var ag = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.22, 0), new THREE.Vector3(0, 0.22, 0)
  ]);
  aimLine = new THREE.Line(ag, new THREE.LineBasicMaterial({color: 0xffe566, transparent: true, opacity: 0.65}));
  aimLine.visible = false;
  scene.add(aimLine);

  for (var gi = 0; gi < GN; gi++) {
    var gd = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 7, 7),
      new THREE.MeshBasicMaterial({color: 0xffe566, transparent: true, opacity: (1 - gi / GN) * 0.48})
    );
    gd.visible = false;
    scene.add(gd);
    ghosts.push(gd);
  }
}

function updateTraj(sx, sz, vx, vz) {
  var px = sx, pz = sz, pvx = vx, pvz = vz;
  var dt = 0.07;
  for (var gi = 0; gi < GN; gi++) {
    var spd = Math.sqrt(pvx*pvx + pvz*pvz);
    if (spd < 0.08) { ghosts[gi].visible = false; continue; }
    var nx = pvx/spd, nz = pvz/spd;
    var ns = spd - FRIC_C * dt;
    ns *= Math.max(0, 1 - FRIC_V * dt);
    if (ns < 0) ns = 0;
    pvx = nx * ns; pvz = nz * ns;
    px += pvx * dt; pz += pvz * dt;
    if (px < -HA+RS) { px = -HA+RS; pvx = Math.abs(pvx) * WELAST; }
    if (px >  HA-RS) { px =  HA-RS; pvx = -Math.abs(pvx) * WELAST; }
    if (pz < -HA+RS) { pz = -HA+RS; pvz = Math.abs(pvz) * WELAST; }
    if (pz >  HA-RS) { pz =  HA-RS; pvz = -Math.abs(pvz) * WELAST; }
    ghosts[gi].position.set(px, 0.22, pz);
    ghosts[gi].visible = true;
  }
}

function hideGhosts() {
  for (var gi = 0; gi < ghosts.length; gi++) ghosts[gi].visible = false;
}

// ══════════════════════════════════════════════════════════════════════════
//  SPAWN
// ══════════════════════════════════════════════════════════════════════════
function spawnAll() {
  for (var ci = 0; ci < coins.length; ci++) scene.remove(coins[ci].mesh);
  coins = [];
  if (striker) scene.remove(striker.mesh);

  var layout = makeLayout();
  var WP = layout.w, BP = layout.b;
  var id = 0;
  for (var wi = 0; wi < WP.length; wi++) coins.push(new Coin(id++, 'white', RC, 1, WP[wi][0], WP[wi][1]));
  for (var bi = 0; bi < BP.length; bi++) coins.push(new Coin(id++, 'black', RC, 1, BP[bi][0], BP[bi][1]));
  coins.push(new Coin(id++, 'red', RR, 1, 0, 0));

  // Resolve spawn overlaps
  for (var iter = 0; iter < 50; iter++) {
    var ok = true;
    for (var ii = 0; ii < coins.length; ii++) {
      for (var jj = ii + 1; jj < coins.length; jj++) {
        var a = coins[ii], b = coins[jj];
        var dx = b.x - a.x, dz = b.z - a.z;
        var dist = Math.sqrt(dx*dx + dz*dz) || 1e-6;
        var md = a.r + b.r + 0.008;
        if (dist < md) {
          ok = false;
          var push = (md - dist) * 0.5;
          var nx = dx / dist, nz = dz / dist;
          a.x -= nx * push; a.z -= nz * push;
          b.x += nx * push; b.z += nz * push;
        }
      }
    }
    if (ok) break;
  }

  var sz = flipped ? -SZ : SZ;
  striker = new Coin(id++, 'striker', RS, 2.5, 0, sz);
}

// ══════════════════════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════════════════════
function toWorld(ev) {
  var r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((ev.clientX - r.left) / r.width)  * 2 - 1;
  mouse.y = -((ev.clientY - r.top)  / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, cam);
  var plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  var pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, pt);
  return pt;
}

function onDown(ev) {
  if (!ready || !active || settling) return;
  var pt = toWorld(ev); if (!pt) return;
  var dx = pt.x - striker.x, dz = pt.z - striker.z;
  if (Math.sqrt(dx*dx + dz*dz) <= striker.r + 0.45) {
    dragging = true;
    aimLine.visible = true;
    document.getElementById('pw').style.display = 'block';
  }
}

function onMove(ev) {
  if (!dragging || !ready) return;
  var pt = toWorld(ev); if (!pt) return;
  var dx = pt.x - striker.x, dz = pt.z - striker.z;
  var rawLen = Math.sqrt(dx*dx + dz*dz);
  document.getElementById('pfill').style.width = (Math.min(rawLen / 5, 1) * 100) + '%';

  var power = Math.min(rawLen, 5) / 5 * MAX_PWR;
  var nl = rawLen || 1;
  var vx = -dx / nl * power, vz = -dz / nl * power;

  var pos = aimLine.geometry.attributes.position.array;
  pos[0] = striker.x; pos[1] = 0.22; pos[2] = striker.z;
  pos[3] = striker.x - dx * 1.6; pos[4] = 0.22; pos[5] = striker.z - dz * 1.6;
  aimLine.geometry.attributes.position.needsUpdate = true;
  updateTraj(striker.x, striker.z, vx, vz);
}

function onUp(ev) {
  if (!dragging || !ready) return;
  dragging = false;
  aimLine.visible = false;
  hideGhosts();
  document.getElementById('pw').style.display = 'none';
  document.getElementById('pfill').style.width = '0%';
  var pt = toWorld(ev); if (!pt) return;
  var dx = striker.x - pt.x, dz = striker.z - pt.z;
  var len = Math.sqrt(dx*dx + dz*dz);
  if (len < 0.08) return;
  var power = Math.min(len, 5) / 5 * MAX_PWR;
  striker.vx = dx / len * power;
  striker.vz = dz / len * power;
  settling = true;
}

// ══════════════════════════════════════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════════════════════════════════════
function physicsStep(dt) {
  var sdt = dt / STEPS;
  for (var s = 0; s < STEPS; s++) subStep(sdt);

  // Pocket detection
  var jp = null;
  for (var i = coins.length - 1; i >= 0; i--) {
    var c = coins[i];
    for (var pi = 0; pi < POCKETS.length; pi++) {
      var p = POCKETS[pi];
      var dx = c.x - p.x, dz = c.z - p.z;
      if (Math.sqrt(dx*dx + dz*dz) < PR) {
        scene.remove(c.mesh);
        coins.splice(i, 1);
        c.pocketed = true;
        onPocket(c);
        jp = c;
        break;
      }
    }
  }

  // Queen cover
  if (qPending && jp && jp.type !== 'red' && jp.type === qBy) {
    qPending = false; qWon = qBy;
    if (qWon === 'white') sW += 5; else sB += 5;
    document.getElementById('qb').style.display = 'none';
    toast('♛ QUEEN COVERED! +5 pts');
  }

  // Striker foul
  for (var pi = 0; pi < POCKETS.length; pi++) {
    var p = POCKETS[pi];
    var dx = striker.x - p.x, dz = striker.z - p.z;
    if (Math.sqrt(dx*dx + dz*dz) < PR) {
      if (turn === 'white') sW = Math.max(0, sW - 1); else sB = Math.max(0, sB - 1);
      toast('⚠ FOUL! -1 point');
      resetStriker(); updateHUD(); break;
    }
  }

  // Settle check
  if (settling) {
    var allMoving = false;
    var all = coins.concat([striker]);
    for (var ai = 0; ai < all.length; ai++) {
      if (all[ai].speed() > REST_V) { allMoving = true; break; }
    }
    if (!allMoving) { settling = false; endTurn(); }
  }
}

function subStep(dt) {
  var all = coins.concat([striker]);
  for (var i = 0; i < all.length; i++) all[i].update(dt);

  // Walls (skip near pockets)
  for (var i = 0; i < all.length; i++) {
    var c = all[i];
    var lo = -HA + c.r, hi = HA - c.r;
    var nearPocket = false;
    for (var pi = 0; pi < POCKETS.length; pi++) {
      var p = POCKETS[pi];
      var dx = c.x - p.x, dz = c.z - p.z;
      if (Math.sqrt(dx*dx + dz*dz) < PR + c.r * 0.6) { nearPocket = true; break; }
    }
    if (nearPocket) continue;
    if (c.x < lo) { c.x = lo; c.vx =  Math.abs(c.vx) * WELAST; }
    if (c.x > hi) { c.x = hi; c.vx = -Math.abs(c.vx) * WELAST; }
    if (c.z < lo) { c.z = lo; c.vz =  Math.abs(c.vz) * WELAST; }
    if (c.z > hi) { c.z = hi; c.vz = -Math.abs(c.vz) * WELAST; }
  }

  // Collisions — 3 passes
  for (var pass = 0; pass < 3; pass++) {
    for (var i = 0; i < all.length; i++) {
      for (var j = i + 1; j < all.length; j++) {
        var a = all[i], b = all[j];
        var dx = b.x - a.x, dz = b.z - a.z;
        var dist = Math.sqrt(dx*dx + dz*dz);
        var md = a.r + b.r;
        if (dist >= md || dist < 1e-7) continue;
        var nx = dx / dist, nz = dz / dist;
        var ov = md - dist, tm = a.mass + b.mass;
        a.x -= nx * 0.8 * ov * b.mass / tm;
        a.z -= nz * 0.8 * ov * b.mass / tm;
        b.x += nx * 0.8 * ov * a.mass / tm;
        b.z += nz * 0.8 * ov * a.mass / tm;
        if (pass > 0) continue;
        var dot = (b.vx - a.vx) * nx + (b.vz - a.vz) * nz;
        if (dot >= 0) continue;
        var j2 = -(1 + ELAST) * dot / (1 / a.mass + 1 / b.mass);
        a.vx -= j2 * nx / a.mass; a.vz -= j2 * nz / a.mass;
        b.vx += j2 * nx / b.mass; b.vz += j2 * nz / b.mass;
      }
    }
  }
}

function onPocket(c) {
  if (c.type === 'red') {
    qPending = true; qBy = turn;
    document.getElementById('qb').style.display = 'block';
    toast('♛ QUEEN POCKETED - cover it!');
  } else if (c.type === 'white') {
    if (turn === 'white') { sW += 1; pW++; } else sB += 1;
  } else if (c.type === 'black') {
    if (turn === 'black') { sB += 1; pB++; } else sW += 1;
  }
  updateHUD(); checkWin();
}

function resetStriker() {
  var sz = flipped ? -SZ : SZ;
  striker.x = 0; striker.z = sz; striker.vx = 0; striker.vz = 0;
}

function endTurn() {
  if (qPending) {
    qPending = false;
    document.getElementById('qb').style.display = 'none';
    toast('♛ Queen uncovered - returned!');
    coins.push(new Coin(Date.now(), 'red', RR, 1, 0, 0));
  }
  turn = turn === 'white' ? 'black' : 'white';
  resetStriker(); updateHUD();
}

function checkWin() {
  var w = 0, b = 0;
  for (var i = 0; i < coins.length; i++) {
    if (coins[i].type === 'white') w++;
    if (coins[i].type === 'black') b++;
  }
  if (w === 0 || b === 0) {
    var winner = w === 0 ? 'WHITE' : 'BLACK';
    active = false;
    document.getElementById('wt').textContent = winner + ' WINS!';
    document.getElementById('ws').textContent = 'WHITE ' + sW + '  -  BLACK ' + sB;
    document.getElementById('win').classList.add('on');
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('sW').textContent = sW;
  document.getElementById('sB').textContent = sB;
  var spW = document.getElementById('spW'), spB = document.getElementById('spB');
  if (turn === 'white') { spW.classList.add('on'); spB.classList.remove('on'); }
  else { spB.classList.add('on'); spW.classList.remove('on'); }
  document.getElementById('td').style.background = turn === 'white' ? '#f0ebe0' : '#555048';
  document.getElementById('tt').textContent = turn.toUpperCase() + "'S TURN";
  var cw = document.getElementById('dW'), cb = document.getElementById('dB');
  cw.innerHTML = ''; cb.innerHTML = '';
  for (var i = 0; i < pW; i++) { var d = document.createElement('div'); d.className = 'dot wd'; cw.appendChild(d); }
  if (qWon === 'white') { var d = document.createElement('div'); d.className = 'dot qd'; cw.appendChild(d); }
  for (var i = 0; i < pB; i++) { var d = document.createElement('div'); d.className = 'dot bd'; cb.appendChild(d); }
  if (qWon === 'black') { var d = document.createElement('div'); d.className = 'dot qd'; cb.appendChild(d); }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('on'); }, 2500);
}

// ══════════════════════════════════════════════════════════════════════════
//  RESET / LOOP
// ══════════════════════════════════════════════════════════════════════════
function resetGame() {
  sW = 0; sB = 0; pW = 0; pB = 0;
  qPending = false; qBy = null; qWon = null;
  turn = 'white'; settling = false; dragging = false;
  aimLine.visible = false; hideGhosts();
  document.getElementById('qb').style.display = 'none';
  document.getElementById('win').classList.remove('on');
  spawnAll(); active = true; updateHUD();
}

var lastT = performance.now();
function loop() {
  requestAnimationFrame(loop);
  var now = performance.now();
  var dt = Math.min(0.025, (now - lastT) / 1000);
  lastT = now;
  if (ready) physicsStep(dt);
  renderer.render(scene, cam);
}

function onResize() {
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── Buttons ───────────────────────────────────────────────────────────────
document.getElementById('bR').addEventListener('click', resetGame);
document.getElementById('wb').addEventListener('click', resetGame);
document.getElementById('bF').addEventListener('click', function() {
  flipped = !flipped; posCam(); resetStriker();
});
document.getElementById('b1').addEventListener('click', function() {
  document.getElementById('b1').classList.add('on');
  document.getElementById('b2').classList.remove('on');
  resetGame();
});
document.getElementById('b2').addEventListener('click', function() {
  document.getElementById('b2').classList.add('on');
  document.getElementById('b1').classList.remove('on');
  resetGame();
});

// ── BOOT ─────────────────────────────────────────────────────────────────
initScene();
</script>
