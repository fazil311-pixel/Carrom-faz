<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fazil Carrom Premium 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* Premium 3D Frame Construction */
        #outer-frame { 
            position: relative; width: 94vw; height: 94vw; max-width: 520px; max-height: 520px;
            background: #1a0f0a; border: 22px solid #3e2723; border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
        }

        #playing-surface {
            width: 100%; height: 100%; position: relative;
            background: radial-gradient(circle, #e3c192 10%, #b58d5a 100%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* 3D Pockets - Smaller logic radius */
        .pocket { position: absolute; width: 14%; height: 14%; background: radial-gradient(circle, #000 50%, #151515 100%); border-radius: 50%; box-shadow: inset 0 10px 15px rgba(255,255,255,0.05); z-index: 1; }
        .tl { top: 1%; left: 1%; } .tr { top: 1%; right: 1%; } .bl { bottom: 1%; left: 1%; } .br { bottom: 1%; right: 1%; }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* UI Controls */
        #ui-box { width: 85%; margin-top: 35px; text-align: center; }
        #power-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; margin-bottom: 15px; border: 1px solid #444; overflow: hidden; }
        #power-level { width: 0%; height: 100%; background: linear-gradient(90deg, #ffeb3b, #f44336); transition: width 0.05s; }
        input[type=range] { width: 100%; height: 45px; accent-color: #e3c192; }
        .hint { color: #8d6e63; font-size: 11px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="outer-frame">
        <div id="playing-surface">
            <div class="pocket tl"></div><div class="pocket tr"></div>
            <div class="pocket bl"></div><div class="pocket br"></div>
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div id="ui-box">
        <div id="power-bg"><div id="power-level"></div></div>
        <input type="range" id="positionSlider" min="80" max="520" value="300">
        <div class="hint">Slide to Position • Pull Back to Aim</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events } = Matter;
        const engine = Engine.create(); engine.gravity.y = 0;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 600, height: 600, wireframes: false, background: 'transparent' }
        });

        // 1. Professional Striker
        const striker = Bodies.circle(300, 485, 27, { 
            frictionAir: 0.055, restitution: 0.6,
            render: { fillStyle: '#512da8', strokeStyle: '#ffd700', lineWidth: 4 } 
        });

        // 2. Official 19-Coin Hexagonal Formation
        const coins = [];
        const WHITE = '#ffffff', BLACK = '#262626', QUEEN = '#d32f2f';
        
        // Queen
        coins.push(Bodies.circle(300, 300, 20, { render: { fillStyle: QUEEN, strokeStyle: '#000', lineWidth: 2 } }));
        // Ring 1 (6 coins)
        for(let i=0; i<6; i++) {
            const a = (i * 60) * (Math.PI / 180);
            coins.push(Bodies.circle(300 + Math.cos(a)*42, 300 + Math.sin(a)*42, 20, { render: { fillStyle: i%2===0 ? WHITE : BLACK } }));
        }
        // Ring 2 (12 coins)
        for(let i=0; i<12; i++) {
            const a = (i * 30) * (Math.PI / 180);
            let color = (i===0 || i===1 || i===4 || i===5 || i===8 || i===9) ? BLACK : WHITE;
            coins.push(Bodies.circle(300 + Math.cos(a)*84, 300 + Math.sin(a)*84, 20, { render: { fillStyle: color } }));
        }

        // Pocket Logic: Smaller sensor (20) means it must be IN the hole to disappear
        const pockets = [{x:42, y:42}, {x:558, y:42}, {x:42, y:558}, {x:558, y:558}]
            .map(p => Bodies.circle(p.x, p.y, 22, { isStatic: true, isSensor: true }));

        Composite.add(engine.world, [striker, ...coins]);

        let canShoot = true, startY = 0, dragPower = 0;
        const slider = document.getElementById('positionSlider');
        const powerFill = document.getElementById('power-level');

        slider.oninput = () => { if(canShoot) Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 485 }); };

        window.ontouchstart = (e) => { if(canShoot) startY = e.touches[0].clientY; };
        window.ontouchmove = (e) => {
            if(canShoot) {
                dragPower = Math.min((e.touches[0].clientY - startY), 160);
                powerFill.style.width = (dragPower / 1.6) + '%';
            }
        };
        window.ontouchend = (e) => {
            if(canShoot && dragPower > 15) {
                Matter.Body.applyForce(striker, striker.position, { x: 0, y: -dragPower * 0.00085 });
                canShoot = false; dragPower = 0; powerFill.style.width = '0%';
            }
        };

        // Aim Line Rendering
        Events.on(render, 'afterRender', () => {
            if (canShoot && dragPower > 5) {
                ctx.beginPath();
                ctx.setLineDash([12, 12]);
                ctx.moveTo(striker.position.x, striker.position.y);
                ctx.lineTo(striker.position.x, striker.position.y - 450); // Aiming straight
                ctx.strokeStyle = "rgba(255, 255, 255, 0.35)";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((c, i) => {
                pockets.forEach(p => {
                    // Coin must be deeply centered in the pocket to fall
                    if (Vector.magnitude(Vector.sub(c.position, p.position)) < 24) {
                        Composite.remove(engine.world, c);
                        coins.splice(i, 1);
                    }
                });
            });

            if (!canShoot && Composite.allBodies(engine.world).every(b => b.speed < 0.2)) {
                Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 485 });
                Matter.Body.setVelocity(striker, { x: 0, y: 0 });
                canShoot = true;
            }
        });

        Render.run(render); Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
