<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carrom Physics – White/Black/Red</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #2b0050;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }
  #game-container { position: relative; width: 520px; height: 520px; }
  canvas { border-radius: 26px; display: block; }
  .board-frame {
    pointer-events: none;
    position: absolute;
    inset: 0;
    border-radius: 26px;
    box-shadow:
      0 14px 24px rgba(0,0,0,0.5),
      0 4px 0 #8a4a2a,
      inset 0 0 0 12px #b55a3b,
      inset 0 0 0 22px #ffffff,
      inset 0 0 0 32px #b55a3b;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="world" width="520" height="520"></canvas>
  <div class="board-frame"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
const {
  Engine, Render, Runner, World, Bodies, Body,
  Mouse, MouseConstraint, Events, Vector
} = Matter;

const width = 520, height = 520;
const center = { x: width / 2, y: height / 2 };

const engine = Engine.create();
const world = engine.world;
world.gravity.y = 0;

const canvas = document.getElementById('world');
const render = Render.create({
  canvas,
  engine,
  options: {
    width, height,
    wireframes: false,
    background: '#f4d7a1'
  }
});
Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

const inset = 40;
const walls = [
  Bodies.rectangle(width / 2, inset, width - inset * 2, 10, { isStatic: true, restitution: 0.8 }),
  Bodies.rectangle(width / 2, height - inset, width - inset * 2, 10, { isStatic: true, restitution: 0.8 }),
  Bodies.rectangle(inset, height / 2, 10, height - inset * 2, { isStatic: true, restitution: 0.8 }),
  Bodies.rectangle(width - inset, height / 2, 10, height - inset * 2, { isStatic: true, restitution: 0.8 })
];
World.add(world, walls);

const pockets = [
  { x: inset, y: inset },
  { x: width - inset, y: inset },
  { x: inset, y: height - inset },
  { x: width - inset, y: height - inset }
];

const coinRadius = 12;
const strikerRadius = 16;

function makeCoin(x, y, type) {
  const base = {
    restitution: 0.9,
    friction: 0.02,
    frictionAir: 0.01,
    density: 0.002
  };
  let renderStyle;
  if (type === 'white') {
    renderStyle = { fillStyle: '#ffffff', strokeStyle: '#555', lineWidth: 2 };
  } else if (type === 'black') {
    renderStyle = { fillStyle: '#111', strokeStyle: '#eee', lineWidth: 2 };
  } else {
    renderStyle = { fillStyle: '#c0182b', strokeStyle: '#5a000a', lineWidth: 2 };
  }
  return Bodies.circle(x, y, coinRadius, { ...base, render: renderStyle });
}

const coins = [];
coins.push(makeCoin(center.x, center.y, 'red'));

const innerR = 32;
const innerAngles = [ -90, -30, 30, 90, 150, 210 ];
innerAngles.forEach(a => {
  const rad = a * Math.PI / 180;
  coins.push(makeCoin(center.x + innerR * Math.cos(rad), center.y + innerR * Math.sin(rad), 'white'));
});

const outerR = 60;
const outerAngles = [ -90, -30, 30, 90, 150, 210 ];
outerAngles.forEach(a => {
  const rad = a * Math.PI / 180;
  coins.push(makeCoin(center.x + outerR * Math.cos(rad), center.y + outerR * Math.sin(rad), 'black'));
});
World.add(world, coins);

const strikerStart = { x: center.x, y: height - 80 };
const striker = Bodies.circle(strikerStart.x, strikerStart.y, strikerRadius, {
  restitution: 0.95,
  friction: 0.01,
  frictionAir: 0.01,
  density: 0.004,
  render: { fillStyle: '#7b2cff', strokeStyle: '#fff', lineWidth: 3 }
});
World.add(world, striker);

const mouse = Mouse.create(canvas);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.02, render: { visible: false } }
});
World.add(world, mouseConstraint);

let isDraggingStriker = false;
let dragStart = null;

Events.on(mouseConstraint, 'mousedown', e => {
  const pos = e.mouse.position;
  const dist = Vector.magnitude(Vector.sub(pos, striker.position));
  if (dist <= strikerRadius + 5) {
    isDraggingStriker = true;
    dragStart = { x: striker.position.x, y: striker.position.y };
    Body.setVelocity(striker, { x: 0, y: 0 });
    Body.setAngularVelocity(striker, 0);
  }
});

Events.on(mouseConstraint, 'mouseup', e => {
  if (!isDraggingStriker) return;
  isDraggingStriker = false;
  const pos = e.mouse.position;
  const dragVector = Vector.sub(dragStart, pos);
  const strength = 0.03;
  const impulse = Vector.mult(dragVector, strength);
  Body.applyForce(striker, striker.position, impulse);
});

Events.on(engine, 'beforeUpdate', () => {
  if (isDraggingStriker && mouse.position) {
    const clampY = height - 80;
    const clampX = Math.max(inset + 40, Math.min(width - inset - 40, mouse.position.x));
    Body.setPosition(striker, { x: clampX, y: clampY });
  }
});

const ctx = render.context;
Events.on(render, 'afterRender', () => {
  ctx.save();

  // Pockets
  pockets.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = '#000';
    ctx.arc(p.x, p.y, 24, 0, Math.PI * 2);
    ctx.fill();
  });

  // Center circle
  ctx.beginPath();
  ctx.strokeStyle = '#b54a3b';
  ctx.lineWidth = 5;
  ctx.arc(center.x, center.y, 100, 0, Math.PI * 2);
  ctx.stroke();

  // Star
  ctx.fillStyle = '#c0182b';
  drawStar(ctx, center.x, center.y, 5, 20, 8);

  // Arrow rings
  ctx.strokeStyle = 'rgba(180,60,40,0.9)';
  ctx.lineWidth = 3;
  const ringR = 40;
  const offset = 70;
  drawArrowRing(ctx, center.x, center.y - offset, ringR, 'top');
  drawArrowRing(ctx, center.x, center.y + offset, ringR, 'bottom');
  drawArrowRing(ctx, center.x - offset, center.y, ringR, 'left');
  drawArrowRing(ctx, center.x + offset, center.y, ringR, 'right');

  // Striker glow
  const s = striker.position;
  ctx.beginPath();
  const grad = ctx.createRadialGradient(s.x, s.y, 10, s.x, s.y, 45);
  grad.addColorStop(0, 'rgba(255,140,0,0.9)');
  grad.addColorStop(1, 'rgba(255,140,0,0)');
  ctx.fillStyle = grad;
  ctx.arc(s.x, s.y, 45, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
});

function drawStar(ctx, x, y, points, outerR, innerR) {
  let angle = Math.PI / 2 * 3;
  const step = Math.PI / points;
  ctx.beginPath();
  ctx.moveTo(x, y - outerR);
  for (let i = 0; i < points; i++) {
    ctx.lineTo(x + Math.cos(angle) * outerR, y + Math.sin(angle) * outerR);
    angle += step;
    ctx.lineTo(x + Math.cos(angle) * innerR, y + Math.sin(angle) * innerR);
    angle += step;
  }
  ctx.closePath();
  ctx.fill();
}

function drawArrowRing(ctx, x, y, r, dir) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.fillStyle = 'rgba(180,60,40,0.9)';
  const size = 8;
  if (dir === 'top') {
    ctx.moveTo(x, y - r - size);
    ctx.lineTo(x - size, y - r + 2);
    ctx.lineTo(x + size, y - r + 2);
  } else if (dir === 'bottom') {
    ctx.moveTo(x, y + r + size);
    ctx.lineTo(x - size, y + r - 2);
    ctx.lineTo(x + size, y + r - 2);
  } else if (dir === 'left') {
    ctx.moveTo(x - r - size, y);
    ctx.lineTo(x - r + 2, y - size);
    ctx.lineTo(x - r + 2, y + size);
  } else if (dir === 'right') {
    ctx.moveTo(x + r + size, y);
    ctx.lineTo(x + r - 2, y - size);
    ctx.lineTo(x + r - 2, y + size);
  }
  ctx.closePath();
  ctx.fill();
}
</script>
</body>
</html>
