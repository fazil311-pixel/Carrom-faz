<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fazil Carrom Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a0f0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* The Professional Board */
        #game-board { 
            width: 92vw; height: 92vw; max-width: 500px; max-height: 500px; 
            border: 15px solid #3e2723; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background-image: url('https://i.imgur.com/8Y4W4Xj.png'); /* Wood Texture */
            background-size: cover; position: relative;
        }
        canvas { border-radius: 10px; }

        /* Power Bar */
        #power-ui { width: 80%; height: 10px; background: #333; margin: 20px 0; border-radius: 5px; border: 2px solid #5d3a25; overflow: hidden; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336); transition: width 0.1s; }

        .label { color: gold; font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        input[type=range] { width: 85%; height: 40px; accent-color: gold; }
    </style>
</head>
<body>

    <div id="game-board"></div>

    <div id="power-ui"><div id="power-fill"></div></div>

    <div class="label">Position & Pull Back to Shoot</div>
    <input type="range" id="strikerSlider" min="80" max="520" value="300">

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events } = Matter;
        const engine = Engine.create(); engine.gravity.y = 0;
        const render = Render.create({
            element: document.getElementById('game-board'),
            engine: engine,
            options: { width: 600, height: 600, wireframes: false, background: 'transparent' }
        });

        // 1. Pockets (The Holes)
        const pockets = [
            { x: 45, y: 45 }, { x: 555, y: 45 },
            { x: 45, y: 555 }, { x: 555, y: 555 }
        ].map(p => Bodies.circle(p.x, p.y, 35, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } }));

        // 2. Striker (Purple Hero)
        const striker = Bodies.circle(300, 485, 28, { 
            label: 'striker', frictionAir: 0.05, 
            render: { fillStyle: '#7b1fa2', strokeStyle: '#ffd700', lineWidth: 5 } 
        });

        // 3. Coins (Black, White, and Red Queen)
        const coins = [];
        const positions = [
            {x: 300, y: 300, c: '#f44336'}, // Queen
            {x: 340, y: 300, c: '#fff'}, {x: 260, y: 300, c: '#fff'},
            {x: 300, y: 340, c: '#333'}, {x: 300, y: 260, c: '#333'},
            {x: 328, y: 328, c: '#fff'}, {x: 272, y: 272, c: '#fff'}
        ];
        positions.forEach(p => coins.push(Bodies.circle(p.x, p.y, 20, { restitution: 0.4, frictionAir: 0.04, render: { fillStyle: p.c, strokeStyle: '#999', lineWidth: 2 } })));

        Composite.add(engine.world, [...pockets, striker, ...coins]);

        // 4. Shooting Controls
        const slider = document.getElementById('strikerSlider');
        const powerFill = document.getElementById('power-fill');
        let canShoot = true;
        let startY = 0;

        slider.oninput = () => {
            if(canShoot) Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 485 });
        };

        window.ontouchstart = (e) => { if(canShoot) startY = e.touches[0].clientY; };
        window.ontouchmove = (e) => {
            if(canShoot) {
                let dist = Math.min((e.touches[0].clientY - startY) / 2, 100);
                powerFill.style.width = Math.max(0, dist) + '%';
            }
        };
        window.ontouchend = (e) => {
            if(canShoot) {
                let forceVal = (e.changedTouches[0].clientY - startY) * 0.0007;
                if(forceVal > 0.01) {
                    Matter.Body.applyForce(striker, striker.position, { x: 0, y: -forceVal });
                    canShoot = false;
                    powerFill.style.width = '0%';
                }
            }
        };

        // 5. Scoring & Reset
        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((coin, index) => {
                pockets.forEach(pocket => {
                    let d = Vector.magnitude(Vector.sub(coin.position, pocket.position));
                    if(d < 30) { Composite.remove(engine.world, coin); coins.splice(index, 1); }
                });
            });

            const moving = Composite.allBodies(engine.world).some(b => Vector.magnitude(b.velocity) > 0.1);
            if (!canShoot && !moving) {
                Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 485 });
                Matter.Body.setVelocity(striker, { x: 0, y: 0 });
                canShoot = true;
            }
        });

        Render.run(render); Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
