<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom-faz: Pro Impact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a0a00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #scoreboard { display: flex; justify-content: space-around; width: 90%; max-width: 500px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; margin-bottom: 10px; color: #ffca28; border: 2px solid #5d4037; }
        .score-box { text-align: center; } .score-box span { display: block; font-size: 24px; }
        #board-container { position: relative; width: 92vw; height: 92vw; max-width: 500px; background: #3e2723; border: 15px solid #2b1d14; border-radius: 15px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        #surface { width: 100%; height: 100%; position: relative; background: radial-gradient(circle, #f5e0b7 10%, #d4b483 100%); }
        .pocket { position: absolute; width: 14%; height: 14%; background: #000; border-radius: 50%; }
        .tl { top: 0; left: 0; } .tr { top: 0; right: 0; } .bl { bottom: 0; left: 0; } .br { bottom: 0; right: 0; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #controls { width: 90%; max-width: 500px; margin-top: 20px; }
        input[type=range] { width: 100%; height: 30px; accent-color: #ffca28; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="score-box">WHITE<span id="whiteScore">0</span></div>
        <div class="score-box">QUEEN<span id="queenScore">0</span></div>
        <div class="score-box">BLACK<span id="blackScore">0</span></div>
    </div>

    <div id="board-container">
        <div id="surface">
            <div class="pocket tl"></div><div class="pocket tr"></div>
            <div class="pocket bl"></div><div class="pocket br"></div>
            <canvas id="carromCanvas"></canvas>
        </div>
    </div>

    <div id="controls">
        <input type="range" id="strikerSlider" min="80" max="520" value="300">
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events, Body } = Matter;
        const engine = Engine.create();
        
        // PHYSICAL FIX: Increase precision to 60 iterations (Stops the ghosting!)
        engine.positionIterations = 60;
        engine.velocityIterations = 60;

        const canvas = document.getElementById('carromCanvas');
        const ctx = canvas.getContext('2d');
        const render = Render.create({ canvas, engine, options: { width: 600, height: 600, wireframes: false, background: 'transparent' } });

        // Heavy Striker (High density makes hits more powerful)
        const striker = Bodies.circle(300, 485, 32, { 
            label: 'striker', frictionAir: 0.04, restitution: 0.5, density: 0.8,
            render: { fillStyle: '#4a148c', strokeStyle: '#ffca28', lineWidth: 5 } 
        });

        const coins = [];
        // Queen
        coins.push(Bodies.circle(300, 300, 22, { label: 'queen', density: 0.1, render: { fillStyle: '#d32f2f' } }));
        // Inner Circle
        for(let i=0; i<6; i++) {
            const a = (i * 60) * (Math.PI / 180);
            const type = i % 2 === 0 ? 'white' : 'black';
            coins.push(Bodies.circle(300 + Math.cos(a)*45, 300 + Math.sin(a)*45, 22, { label: type, density: 0.1, render: { fillStyle: type === 'white' ? '#fff' : '#222' } }));
        }

        const pocketLocs = [{x:35,y:35},{x:565,y:35},{x:35,y:565},{x:565,y:565}];
        Composite.add(engine.world, [striker, ...coins]);

        let canShoot = true, startPos = null, currentTouch = null;
        const slider = document.getElementById('strikerSlider');

        // Move striker with slider
        slider.oninput = () => { if(canShoot) Body.setPosition(striker, { x: parseInt(slider.value), y: 485 }); };
        
        // Touch to Aim and Shoot
        canvas.ontouchstart = (e) => {
            if(!canShoot) return;
            const rect = canvas.getBoundingClientRect();
            startPos = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        };

        canvas.ontouchmove = (e) => {
            if(!startPos) return;
            const rect = canvas.getBoundingClientRect();
            currentTouch = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        };
        
        window.ontouchend = () => {
            if(canShoot && startPos && currentTouch) {
                const dx = (startPos.x - currentTouch.x) * 0.012;
                const dy = (startPos.y - currentTouch.y) * 0.012;
                Body.applyForce(striker, striker.position, { x: dx, y: dy });
                canShoot = false;
            }
            startPos = null; currentTouch = null;
        };

        Events.on(render, 'afterRender', () => {
            // Draw Aiming Line
            if (canShoot && startPos && currentTouch) {
                const dx = startPos.x - currentTouch.x, dy = startPos.y - currentTouch.y;
                ctx.beginPath(); ctx.setLineDash([5, 5]);
                ctx.moveTo(striker.position.x, striker.position.y);
                ctx.lineTo(striker.position.x + (dx * 500), striker.position.y + (dy * 500));
                ctx.strokeStyle = "rgba(255, 202, 40, 0.6)"; ctx.stroke(); ctx.setLineDash([]);
            }
        });

        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((c, i) => {
                pocketLocs.forEach(p => {
                    if (Vector.magnitude(Vector.sub(c.position, p)) < 45) {
                        document.getElementById(c.label + 'Score').innerText = parseInt(document.getElementById(c.label + 'Score').innerText) + 1;
                        Composite.remove(engine.world, c);
                        coins.splice(i, 1);
                    }
                });
            });

            // Reset Striker when everything stops
            if (!canShoot && striker.speed < 0.2 && coins.every(c => c.speed < 0.2)) {
                Body.setPosition(striker, { x: parseInt(slider.value), y: 485 });
                Body.setVelocity(striker, { x: 0, y: 0 });
                canShoot = true;
            }
        });

        Runner.run(Runner.create(), engine);
        Render.run(render);
    </script>
</body>
</html>
