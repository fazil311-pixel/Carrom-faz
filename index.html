<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const BS = 10, HALF = 5;
const RW = 0.27, RB = 0.27, RR = 0.30, RS = 0.40;
const PR = 0.72;
const FRICTION = 2.6, REST_V = 0.04;
const RESTITUTION = 0.80, WALL_REST = 0.70;
const MAX_POWER = 13;
const SZ = 3.8; // striker start Z

const POCKETS = [
  {x:-HALF+0.72, z:-HALF+0.72},{x: HALF-0.72, z:-HALF+0.72},
  {x:-HALF+0.72, z: HALF-0.72},{x: HALF-0.72, z: HALF-0.72},
];

// Authentic ring layout
const WHITE_POS = [
  [0.57,0],[-.57,0],[0,.57],[0,-.57],
  [1.13,.57],[-1.13,.57],[1.13,-.57],[-1.13,-.57],[.57,-1.13]
];
const BLACK_POS = [
  [.57,1.13],[-.57,1.13],[-.57,-1.13],[0,1.13],[0,-1.13],
  [1.70,0],[-1.70,0],[.85,.85],[-.85,-.85]
];

// ─── State ─────────────────────────────────────────────────────────────────
let scene, camera, renderer;
let coins = [], striker = null, aimLine = null;
let raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
let dragging = false, sceneReady = false, gameActive = false, settling = false;

let currentTurn = 'white';
let scoreW = 0, scoreB = 0, pktW = 0, pktB = 0;
let queenPending = false, queenBy = null, queenWon = null;
let cameraFlipped = false;
let toastTimer = null;

// ─── Coin class ─────────────────────────────────────────────────────────────
class Coin {
  constructor(id, type, r, mass, x, z) {
    this.id = id; this.type = type; this.r = r; this.mass = mass;
    this.vx = 0; this.vz = 0; this.pocketed = false;

    const C = {white:0xe8e0d0, black:0x2a2520, red:0xcc2222, striker:0xd4a532};
    const rough = {white:.4, black:.55, red:.3, striker:.2};
    const metal = {white:.1, black:.05, red:.15, striker:.7};

    const g = new THREE.CylinderGeometry(r, r, .22, 40);
    const m = new THREE.MeshStandardMaterial({color:C[type], roughness:rough[type], metalness:metal[type]});
    this.mesh = new THREE.Mesh(g, m);
    this.mesh.castShadow = true;

    // Ring detail
    const rc = {white:0xb0a898, black:0x4a4540, red:0xff6655, striker:0xffd700};
    const rg = new THREE.TorusGeometry(r*.87, type==='striker'?.045:.028, 8, 40);
    const rm = new THREE.MeshStandardMaterial({color:rc[type], roughness:.3, metalness:.4});
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI/2;
    this.mesh.add(ring);

    this.mesh.rotation.x = Math.PI/2;
    this.mesh.position.set(x, .11, z);
    scene.add(this.mesh);
  }
  get x(){return this.mesh.position.x}
  get z(){return this.mesh.position.z}
  set x(v){this.mesh.position.x=v}
  set z(v){this.mesh.position.z=v}
  speed(){return Math.hypot(this.vx, this.vz)}
  update(dt){
    if(this.speed()<REST_V){this.vx=0;this.vz=0;return}
    this.x += this.vx*dt; this.z += this.vz*dt;
    const d = Math.max(0, 1-FRICTION*dt);
    this.vx*=d; this.vz*=d;
  }
}

// ─── Build Scene ───────────────────────────────────────────────────────────
function initScene() {
  const wrap = document.getElementById('canvasWrap');
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  wrap.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0a06);
  scene.fog = new THREE.Fog(0x0d0a06, 30, 50);

  camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, .1, 100);
  posCamera();

  scene.add(new THREE.AmbientLight(0x3a2e20, 1.4));
  const hemi = new THREE.HemisphereLight(0xffeedd, 0x221100, .9);
  scene.add(hemi);

  const spot = new THREE.SpotLight(0xffe8c0, 2.8, 40, Math.PI/5, .45, 1.5);
  spot.position.set(0, 15, 0); spot.castShadow = true;
  spot.shadow.mapSize.set(2048,2048);
  scene.add(spot);

  const fill = new THREE.DirectionalLight(0xaabbff, .35);
  fill.position.set(-8,8,6); scene.add(fill);

  buildBoard();
  buildPockets();
  buildAimLine();

  // floor
  const fl = new THREE.Mesh(new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x070503,roughness:1}));
  fl.rotation.x = -Math.PI/2; fl.position.y = -.42;
  scene.add(fl);

  spawnCoins();

  window.addEventListener('resize', onResize);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerdown', onDown);
  window.addEventListener('pointerup', onUp);

  sceneReady = true; gameActive = true;
  updateHUD();
  loop();
}

function posCamera() {
  if(!camera) return;
  const f = cameraFlipped ? -1 : 1;
  camera.position.set(0, 14, f*16);
  camera.lookAt(0, 0, f*.5);
}

function buildBoard() {
  // Playing surface
  const surf = new THREE.Mesh(
    new THREE.BoxGeometry(BS, .18, BS),
    new THREE.MeshStandardMaterial({color:0x4a7a3a, roughness:.85, metalness:.0})
  );
  surf.receiveShadow = true; surf.position.y = .09; scene.add(surf);

  // Wood frame
  const fm = new THREE.MeshStandardMaterial({color:0x6b3e1a, roughness:.72, metalness:.05});
  const FT = .55, FH = .55;
  [
    [BS+FT*2, FH, FT,   0,        FH/2,  HALF+FT/2],
    [BS+FT*2, FH, FT,   0,        FH/2, -HALF-FT/2],
    [FT,      FH, BS,   HALF+FT/2,FH/2,  0],
    [FT,      FH, BS,  -HALF-FT/2,FH/2,  0],
  ].forEach(([w,h,d,x,y,z])=>{
    const me = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),fm);
    me.position.set(x,y,z); me.castShadow=true; scene.add(me);
  });

  // Base
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(BS+FT*2+.2,.35,BS+FT*2+.2),
    new THREE.MeshStandardMaterial({color:0x4a2408,roughness:.8,metalness:.02})
  );
  base.position.y=-.17; base.castShadow=true; base.receiveShadow=true;
  scene.add(base);

  // Board lines
  addLine(-HALF+1.2,-HALF+1.2, HALF-1.2, HALF-1.2, 0x2a5a28);
  addLine( HALF-1.2,-HALF+1.2,-HALF+1.2, HALF-1.2, 0x2a5a28);

  // Center circle
  const cc = new THREE.Mesh(
    new THREE.RingGeometry(.52,.60,48),
    new THREE.MeshStandardMaterial({color:0xcc2222,side:THREE.DoubleSide,roughness:.9})
  );
  cc.rotation.x=-Math.PI/2; cc.position.y=.185; scene.add(cc);

  // Striker baselines
  [-1,1].forEach(s=>{
    const bl = new THREE.Mesh(
      new THREE.PlaneGeometry(2.5,.04),
      new THREE.MeshStandardMaterial({color:0xddcc88,roughness:1})
    );
    bl.rotation.x=-Math.PI/2; bl.position.set(0,.185,s*SZ);
    scene.add(bl);
  });
}

function addLine(x0,z0,x1,z1,col) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x0,.19,z0), new THREE.Vector3(x1,.19,z1)
  ]);
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:col})));
}

function buildPockets() {
  POCKETS.forEach(p=>{
    const hole = new THREE.Mesh(
      new THREE.CircleGeometry(PR*.9,32),
      new THREE.MeshStandardMaterial({color:0x080604,roughness:1})
    );
    hole.rotation.x=-Math.PI/2; hole.position.set(p.x,.188,p.z); scene.add(hole);

    const rim = new THREE.Mesh(
      new THREE.RingGeometry(PR*.88,PR*1.02,32),
      new THREE.MeshStandardMaterial({color:0xd4a532,roughness:.3,metalness:.7})
    );
    rim.rotation.x=-Math.PI/2; rim.position.set(p.x,.189,p.z); scene.add(rim);
  });
}

function buildAimLine() {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,.22,0), new THREE.Vector3(0,.22,0)
  ]);
  aimLine = new THREE.Line(g, new THREE.LineBasicMaterial({color:0xffe566,transparent:true,opacity:.75}));
  aimLine.visible = false;
  scene.add(aimLine);
}

function spawnCoins() {
  coins.forEach(c=>scene.remove(c.mesh));
  coins = [];
  if(striker) scene.remove(striker.mesh);
  let id = 0;
  WHITE_POS.forEach(([x,z])=>coins.push(new Coin(id++,'white',RW,1,x,z)));
  BLACK_POS.forEach(([x,z])=>coins.push(new Coin(id++,'black',RB,1,x,z)));
  coins.push(new Coin(id++,'red',RR,1,0,0));
  const sz = cameraFlipped ? -SZ : SZ;
  striker = new Coin(id++,'striker',RS,2.5,0,sz);
  striker.mesh.position.y = .12;
}

// ─── Input ─────────────────────────────────────────────────────────────────
function toWorld(ev) {
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((ev.clientX-r.left)/r.width)*2-1;
  mouse.y = -((ev.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const pl = new THREE.Plane(new THREE.Vector3(0,1,0),0);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(pl,pt);
  return pt;
}

function onDown(ev) {
  if(!sceneReady||!gameActive||settling) return;
  const pt = toWorld(ev); if(!pt) return;
  if(Math.hypot(pt.x-striker.x, pt.z-striker.z) <= striker.r+.35) {
    dragging = true;
    aimLine.visible = true;
    document.getElementById('powerWrap').style.display='block';
  }
}

function onMove(ev) {
  if(!dragging||!sceneReady) return;
  const pt = toWorld(ev); if(!pt) return;
  const dx=pt.x-striker.x, dz=pt.z-striker.z;
  const pct = Math.min(Math.hypot(dx,dz)/5,1)*100;
  document.getElementById('powerFill').style.width=pct+'%';
  const ex=striker.x-dx*1.6, ez=striker.z-dz*1.6;
  const pos=aimLine.geometry.attributes.position.array;
  pos[0]=striker.x; pos[1]=.22; pos[2]=striker.z;
  pos[3]=ex;        pos[4]=.22; pos[5]=ez;
  aimLine.geometry.attributes.position.needsUpdate=true;
}

function onUp(ev) {
  if(!dragging||!sceneReady) return;
  dragging=false; aimLine.visible=false;
  document.getElementById('powerWrap').style.display='none';
  document.getElementById('powerFill').style.width='0%';
  const pt=toWorld(ev); if(!pt) return;
  const dx=striker.x-pt.x, dz=striker.z-pt.z;
  const len=Math.hypot(dx,dz); if(len<.1) return;
  const power=Math.min(len,5)/5*MAX_POWER;
  striker.vx=dx/len*power; striker.vz=dz/len*power;
  settling=true;
}

// ─── Physics ───────────────────────────────────────────────────────────────
function physicsStep(dt) {
  for(const c of coins) c.update(dt);
  striker.update(dt);

  const all=[...coins, striker];

  // Walls
  for(const c of all) {
    const lo=-HALF+c.r, hi=HALF-c.r;
    if(c.x<lo){c.x=lo; c.vx=Math.abs(c.vx)*WALL_REST;}
    if(c.x>hi){c.x=hi; c.vx=-Math.abs(c.vx)*WALL_REST;}
    if(c.z<lo){c.z=lo; c.vz=Math.abs(c.vz)*WALL_REST;}
    if(c.z>hi){c.z=hi; c.vz=-Math.abs(c.vz)*WALL_REST;}
  }

  // Collisions
  for(let i=0;i<all.length;i++) {
    for(let j=i+1;j<all.length;j++) {
      const a=all[i], b=all[j];
      const dx=b.x-a.x, dz=b.z-a.z;
      const dist=Math.hypot(dx,dz);
      const md=a.r+b.r;
      if(dist<md && dist>1e-6) {
        const nx=dx/dist, nz=dz/dist;
        const ov=md-dist, tm=a.mass+b.mass;
        a.x-=nx*ov*(b.mass/tm); a.z-=nz*ov*(b.mass/tm);
        b.x+=nx*ov*(a.mass/tm); b.z+=nz*ov*(a.mass/tm);
        const rvx=b.vx-a.vx, rvz=b.vz-a.vz;
        const dot=rvx*nx+rvz*nz;
        if(dot>0) continue;
        const imp=-(1+RESTITUTION)*dot/(1/a.mass+1/b.mass);
        a.vx-=imp*nx/a.mass; a.vz-=imp*nz/a.mass;
        b.vx+=imp*nx/b.mass; b.vz+=imp*nz/b.mass;
      }
    }
  }

  // Pockets
  let justPocketed = null;
  for(let i=coins.length-1;i>=0;i--) {
    const c=coins[i];
    for(const p of POCKETS) {
      if(Math.hypot(c.x-p.x, c.z-p.z)<PR) {
        scene.remove(c.mesh);
        coins.splice(i,1);
        c.pocketed=true;
        handlePocket(c);
        justPocketed=c;
        break;
      }
    }
  }

  // Queen cover
  if(queenPending && justPocketed && justPocketed.type!=='red') {
    if(justPocketed.type===queenBy) {
      queenPending=false;
      queenWon=queenBy;
      if(queenWon==='white') scoreW+=5; else scoreB+=5;
      document.getElementById('queenBadge').style.display='none';
      toast('♛ QUEEN COVERED! +5 pts');
    }
  }

  // Striker in pocket
  for(const p of POCKETS) {
    if(Math.hypot(striker.x-p.x, striker.z-p.z)<PR) {
      if(currentTurn==='white') scoreW=Math.max(0,scoreW-1);
      else scoreB=Math.max(0,scoreB-1);
      toast('⚠ FOUL! -1 point');
      resetStriker(); updateHUD(); break;
    }
  }

  // Settle check
  if(settling) {
    if(!all.some(c=>c.speed()>REST_V)) {
      settling=false;
      endTurn();
    }
  }
}

function handlePocket(c) {
  if(c.type==='red') {
    queenPending=true; queenBy=currentTurn;
    document.getElementById('queenBadge').style.display='block';
    toast('♛ QUEEN POCKETED — cover it!');
  } else if(c.type==='white') {
    if(currentTurn==='white'){scoreW+=1;pktW++;} else scoreB+=1;
  } else if(c.type==='black') {
    if(currentTurn==='black'){scoreB+=1;pktB++;} else scoreW+=1;
  }
  updateHUD(); checkWin();
}

function resetStriker() {
  const sz = cameraFlipped ? -SZ : SZ;
  striker.x=0; striker.z=sz; striker.vx=0; striker.vz=0;
  striker.mesh.position.y=.12;
}

function endTurn() {
  if(queenPending) {
    // Not covered — respawn queen
    queenPending=false;
    document.getElementById('queenBadge').style.display='none';
    toast('♛ Queen not covered — returned!');
    const id=Date.now();
    coins.push(new Coin(id,'red',RR,1,0,0));
  }
  currentTurn = currentTurn==='white' ? 'black' : 'white';
  resetStriker();
  updateHUD();
}

function checkWin() {
  const w=coins.filter(c=>c.type==='white').length;
  const b=coins.filter(c=>c.type==='black').length;
  if(w===0||b===0) {
    const winner = w===0 ? 'WHITE' : 'BLACK';
    gameActive=false;
    document.getElementById('msgTitle').textContent=winner+' WINS!';
    document.getElementById('msgSub').textContent=`WHITE ${scoreW}  —  BLACK ${scoreB}`;
    document.getElementById('msgOverlay').classList.add('show');
  }
}

// ─── HUD ───────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-white').textContent=scoreW;
  document.getElementById('score-black').textContent=scoreB;
  document.getElementById('panel-white').classList.toggle('active',currentTurn==='white');
  document.getElementById('panel-black').classList.toggle('active',currentTurn==='black');
  document.getElementById('turnDot').style.background=currentTurn==='white'?'#f0ebe0':'#5a5248';
  document.getElementById('turnText').textContent=currentTurn.toUpperCase()+"'S TURN";
  renderDots();
}

function renderDots() {
  const cw=document.getElementById('coins-white');
  const cb=document.getElementById('coins-black');
  cw.innerHTML=''; cb.innerHTML='';
  for(let i=0;i<pktW;i++){const d=document.createElement('div');d.className='dot wdot';cw.appendChild(d);}
  if(queenWon==='white'){const d=document.createElement('div');d.className='dot qdot';cw.appendChild(d);}
  for(let i=0;i<pktB;i++){const d=document.createElement('div');d.className='dot bdot';cb.appendChild(d);}
  if(queenWon==='black'){const d=document.createElement('div');d.className='dot qdot';cb.appendChild(d);}
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── Reset ─────────────────────────────────────────────────────────────────
function resetGame() {
  scoreW=0;scoreB=0;pktW=0;pktB=0;
  queenPending=false;queenBy=null;queenWon=null;
  currentTurn='white'; settling=false; dragging=false;
  aimLine.visible=false;
  document.getElementById('queenBadge').style.display='none';
  document.getElementById('msgOverlay').classList.remove('show');
  spawnCoins(); gameActive=true; updateHUD();
}

// ─── Loop ──────────────────────────────────────────────────────────────────
let last=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(), dt=Math.min(.025,(now-last)/1000); last=now;
  if(sceneReady) physicsStep(dt);
  renderer.render(scene,camera);
}

function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

// ─── Buttons ───────────────────────────────────────────────────────────────
document.getElementById('btnReset').addEventListener('click',resetGame);
document.getElementById('msgBtn').addEventListener('click',resetGame);
document.getElementById('btnCamera').addEventListener('click',()=>{
  cameraFlipped=!cameraFlipped; posCamera(); resetStriker();
});
document.getElementById('btn1v1').addEventListener('click',()=>{
  document.getElementById('btn1v1').classList.add('active');
  document.getElementById('btn2v2').classList.remove('active');
  resetGame();
});
document.getElementById('btn2v2').addEventListener('click',()=>{
  document.getElementById('btn2v2').classList.add('active');
  document.getElementById('btn1v1').classList.remove('active');
  resetGame();
});

initScene();
</script>

</body>
