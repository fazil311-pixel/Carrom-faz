<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fazil Carrom 3D Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #0f0a08; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* Realistic 3D Wood Board */
        #board-container { 
            position: relative; 
            width: 94vw; height: 94vw; max-width: 520px; max-height: 520px;
            border: 18px solid #2d1b0f; border-radius: 30px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 20px 60px rgba(0,0,0,0.9);
            background: radial-gradient(circle, #e3c192 0%, #c19a6b 100%); /* High-quality wood base */
        }

        /* The 4 Corner Pockets */
        .pocket { position: absolute; width: 14%; height: 14%; background: radial-gradient(circle, #000 60%, #1a1a1a 100%); border-radius: 50%; box-shadow: inset 0 5px 10px rgba(255,255,255,0.1); }
        .tl { top: 2%; left: 2%; } .tr { top: 2%; right: 2%; }
        .bl { bottom: 2%; left: 2%; } .br { bottom: 2%; right: 2%; }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* Power & Control UI */
        #ui-panel { width: 90%; margin-top: 25px; display: flex; flex-direction: column; align-items: center; }
        #power-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-bottom: 15px; border: 1px solid #444; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffeb3b, #f44336); border-radius: 4px; transition: width 0.05s; }
        .label { color: #c19a6b; font-size: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        input[type=range] { width: 100%; height: 40px; accent-color: #c19a6b; }
    </style>
</head>
<body>

    <div id="board-container">
        <div class="pocket tl"></div><div class="pocket tr"></div>
        <div class="pocket bl"></div><div class="pocket br"></div>
        <canvas id="carromCanvas"></canvas>
    </div>

    <div id="ui-panel">
        <div id="power-bar"><div id="power-fill"></div></div>
        <div class="label">Drag Striker & Pull Back</div>
        <input type="range" id="positionSlider" min="80" max="520" value="300">
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events } = Matter;
        const engine = Engine.create(); engine.gravity.y = 0;
        const canvas = document.getElementById('carromCanvas');

        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 600, height: 600, wireframes: false, background: 'transparent' }
        });

        // Professional Pockets
        const pocketSensors = [
            { x: 50, y: 50 }, { x: 550, y: 50 },
            { x: 50, y: 550 }, { x: 550, y: 550 }
        ].map(p => Bodies.circle(p.x, p.y, 35, { isStatic: true, isSensor: true, render: { visible: false } }));

        // Striker - High Resolution
        const striker = Bodies.circle(300, 480, 28, { 
            label: 'striker', restitution: 0.6, frictionAir: 0.06,
            render: { fillStyle: '#6200ea', strokeStyle: '#ffd700', lineWidth: 4 } 
        });

        // 3D Coin Setup (Queen, Black, White)
        const coins = [];
        const setup = [
            {x: 300, y: 300, c: '#d50000', s: '#ff8a80'}, // Queen
            {x: 342, y: 300, c: '#fafafa', s: '#bdbdbd'}, {x: 258, y: 300, c: '#fafafa', s: '#bdbdbd'}, // White
            {x: 300, y: 342, c: '#212121', s: '#424242'}, {x: 300, y: 258, c: '#212121', s: '#424242'}  // Black
        ];
        setup.forEach(p => coins.push(Bodies.circle(p.x, p.y, 20, { 
            restitution: 0.5, frictionAir: 0.04, 
            render: { fillStyle: p.c, strokeStyle: p.s, lineWidth: 3 } 
        })));

        Composite.add(engine.world, [...pocketSensors, striker, ...coins]);

        // Touch Controls
        const slider = document.getElementById('positionSlider');
        const powerFill = document.getElementById('power-fill');
        let canShoot = true, startY = 0;

        slider.oninput = () => { if(canShoot) Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 480 }); };

        window.addEventListener('touchstart', (e) => { if(canShoot) startY = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            if(canShoot) {
                let dist = Math.min((e.touches[0].clientY - startY) / 2, 100);
                powerFill.style.width = Math.max(0, dist) + '%';
            }
        });
        window.addEventListener('touchend', (e) => {
            if(canShoot) {
                let force = (e.changedTouches[0].clientY - startY) * 0.0008;
                if(force > 0.02) {
                    Matter.Body.applyForce(striker, striker.position, { x: 0, y: -force });
                    canShoot = false;
                    powerFill.style.width = '0%';
                }
            }
        });

        // Pocket Logic
        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((coin, i) => {
                pocketSensors.forEach(p => {
                    if (Vector.magnitude(Vector.sub(coin.position, p.position)) < 35) {
                        Composite.remove(engine.world, coin);
                        coins.splice(i, 1);
                    }
                });
            });
            
            const isMoving = Composite.allBodies(engine.world).some(b => b.speed > 0.15);
            if (!canShoot && !isMoving) {
                Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 480 });
                Matter.Body.setVelocity(striker, { x: 0, y: 0 });
                canShoot = true;
            }
        });

        Render.run(render); Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
