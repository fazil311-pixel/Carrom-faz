<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pro: Fluid Motion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a0a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #scoreboard { display: flex; justify-content: space-between; width: 90%; max-width: 480px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; margin-bottom: 10px; color: #fff; border: 1px solid #5e35b1; backdrop-filter: blur(5px); }
        .stat { text-align: center; } .val { display: block; font-size: 20px; font-weight: 800; color: #ffca28; }
        #board-container { position: relative; width: 94vw; height: 94vw; max-width: 500px; max-height: 500px; background: #4e342e; border: 14px solid #2d1b10; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #surface { width: 100%; height: 100%; position: relative; background: radial-gradient(circle, #f3e5f5 10%, #d7ccc8 100%); overflow: hidden; }
        .pocket { position: absolute; width: 14%; height: 14%; background: #121212; border-radius: 50%; box-shadow: inset 0 5px 10px #000; z-index: 5; }
        .tl { top: 1%; left: 1%; } .tr { top: 1%; right: 1%; } .bl { bottom: 1%; left: 1%; } .br { bottom: 1%; right: 1%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #controls { width: 90%; max-width: 480px; margin-top: 20px; text-align: center; }
        input[type=range] { width: 100%; height: 12px; border-radius: 10px; appearance: none; background: #5e35b1; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 25px; height: 25px; background: #ffca28; border-radius: 50%; border: 3px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="stat">WHITE <span id="whiteScore" class="val">0</span></div>
        <div class="stat">BLACK <span id="blackScore" class="val">0</span></div>
        <div class="stat">QUEEN <span id="queenScore" class="val">0</span></div>
    </div>

    <div id="board-container">
        <div id="surface">
            <div class="pocket tl"></div><div class="pocket tr"></div>
            <div class="pocket bl"></div><div class="pocket br"></div>
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div id="controls">
        <input type="range" id="strikerPos" min="85" max="515" value="300">
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events, Body } = Matter;
        const engine = Engine.create();
        engine.positionIterations = 60; // Max possible accuracy for collisions
        engine.velocityIterations = 60;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const render = Render.create({ canvas, engine, options: { width: 600, height: 600, wireframes: false, background: 'transparent' } });

        const striker = Bodies.circle(300, 485, 30, { 
            label: 'striker', restitution: 0.5, frictionAir: 0.04, density: 0.2,
            render: { fillStyle: '#7b1fa2', strokeStyle: '#ffeb3b', lineWidth: 5 } 
        });

        const coins = [Bodies.circle(300, 300, 21, { label: 'queen', density: 0.05, render: { fillStyle: '#c62828', strokeStyle: '#b71c1c', lineWidth: 2 } })];
        for(let i=0; i<6; i++) {
            let angle = (i * 60) * (Math.PI / 180);
            coins.push(Bodies.circle(300 + Math.cos(angle)*42, 300 + Math.sin(angle)*42, 21, { 
                label: i%2===0 ? 'white' : 'black', density: 0.05,
                render: { fillStyle: i%2===0 ? '#fafafa' : '#212121' } 
            }));
        }
        for(let i=0; i<12; i++) {
            let angle = (i * 30) * (Math.PI / 180);
            let type = (i===0 || i===1 || i===4 || i===5 || i===8 || i===9) ? 'black' : 'white';
            coins.push(Bodies.circle(300 + Math.cos(angle)*85, 300 + Math.sin(angle)*85, 21, { 
                label: type, density: 0.05, render: { fillStyle: type === 'white' ? '#fafafa' : '#212121' } 
            }));
        }

        const pockets = [{x:40,y:40},{x:560,y:40},{x:40,y:560},{x:560,y:560}].map(p => Bodies.circle(p.x, p.y, 35, { isStatic: true, isSensor: true }));
        Composite.add(engine.world, [striker, ...coins]);

        let isAiming = false, startPoint = null, currentPoint = null, canPlay = true;
        const slider = document.getElementById('strikerPos');

        slider.oninput = () => { if(canPlay) Body.setPosition(striker, { x: parseInt(slider.value), y: 485 }); };
        
        canvas.ontouchstart = (e) => {
            if(!canPlay) return;
            isAiming = true;
            const rect = canvas.getBoundingClientRect();
            startPoint = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        };

        canvas.ontouchmove = (e) => {
            if(!isAiming) return;
            const rect = canvas.getBoundingClientRect();
            currentPoint = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        };

        canvas.ontouchend = () => {
            if(isAiming && currentPoint) {
                const force = Vector.mult(Vector.sub(startPoint, currentPoint), 0.008);
                Body.applyForce(striker, striker.position, force);
                canPlay = false;
            }
            isAiming = false; startPoint = null; currentPoint = null;
        };

        Events.on(render, 'afterRender', () => {
            // Draw visual guide lines like the video
            ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2;
            ctx.strokeRect(100, 100, 400, 400);
            ctx.beginPath(); ctx.arc(300, 300, 120, 0, Math.PI*2); ctx.stroke();

            if (isAiming && currentPoint) {
                const dx = startPoint.x - currentPoint.x, dy = startPoint.y - currentPoint.y;
                ctx.beginPath();
                ctx.moveTo(striker.position.x, striker.position.y);
                ctx.lineTo(striker.position.x + dx*5, striker.position.y + dy*5);
                ctx.setLineDash([8, 4]); ctx.strokeStyle = "#ffeb3b"; ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((coin, idx) => {
                pockets.forEach(p => {
                    if(Vector.magnitude(Vector.sub(coin.position, p.position)) < 35) {
                        const scoreEl = document.getElementById(coin.label + 'Score');
                        scoreEl.innerText = parseInt(scoreEl.innerText) + 1;
                        Composite.remove(engine.world, coin);
                        coins.splice(idx, 1);
                    }
                });
            });

            if(!canPlay && striker.speed < 0.2 && coins.every(c => c.speed < 0.2)) {
                Body.setPosition(striker, { x: parseInt(slider.value), y: 485 });
                Body.setVelocity(striker, { x: 0, y: 0 });
                canPlay = true;
            }
        });

        Runner.run(Runner.create(), engine);
        Render.run(render);
    </script>
</body>
</html>
