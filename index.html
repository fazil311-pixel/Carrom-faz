<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom-faz Pro Impact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        #scoreboard { display: flex; justify-content: space-around; width: 90%; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; color: white; border: 1px solid #444; }
        .count { display: block; font-size: 18px; font-weight: bold; color: #e3c192; }
        #board-container { position: relative; width: 92vw; height: 92vw; max-width: 480px; max-height: 480px; background: #3e2723; border: 12px solid #2b1d14; border-radius: 15px; }
        #surface { width: 100%; height: 100%; position: relative; background: radial-gradient(circle, #e3c192 20%, #c19a6b 100%); }
        .pocket { position: absolute; width: 13%; height: 13%; background: #000; border-radius: 50%; }
        .tl { top: 1%; left: 1%; } .tr { top: 1%; right: 1%; } .bl { bottom: 1%; left: 1%; } .br { bottom: 1%; right: 1%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #ui { width: 90%; margin-top: 15px; }
        input[type=range] { width: 100%; height: 40px; accent-color: #e3c192; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div>WHITE <span id="whiteScore" class="count">0</span></div>
        <div>BLACK <span id="blackScore" class="count">0</span></div>
        <div>QUEEN <span id="queenScore" class="count">0</span></div>
    </div>

    <div id="board-container">
        <div id="surface">
            <div class="pocket tl"></div><div class="pocket tr"></div>
            <div class="pocket bl"></div><div class="pocket br"></div>
            <canvas id="carromCanvas"></canvas>
        </div>
    </div>

    <div id="ui"><input type="range" id="strikerSlider" min="80" max="520" value="300"></div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Vector, Events } = Matter;
        const engine = Engine.create(); 
        engine.gravity.y = 0;
        // INCREASED POSITION ITERATIONS TO PREVENT GHOSTING
        engine.positionIterations = 10; 

        const canvas = document.getElementById('carromCanvas');
        const ctx = canvas.getContext('2d');
        const hitSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        const render = Render.create({ canvas: canvas, engine: engine, options: { width: 600, height: 600, wireframes: false, background: 'transparent' } });

        let scores = { white: 0, black: 0, queen: 0 };
        
        // HEAVIER STRIKER FOR BETTER IMPACT
        const striker = Bodies.circle(300, 480, 26, { 
            label: 'striker', frictionAir: 0.03, restitution: 0.6, density: 0.02,
            render: { fillStyle: '#4a148c', strokeStyle: '#ffd700', lineWidth: 4 } 
        });

        const coins = [];
        // Queen
        coins.push(Bodies.circle(300, 300, 19, { label: 'queen', restitution: 0.4, density: 0.01, render: { fillStyle: '#d50000' } }));
        // Inner Circle
        for(let i=0; i<6; i++) {
            const a = (i * 60) * (Math.PI / 180);
            const label = i%2===0 ? 'white' : 'black';
            coins.push(Bodies.circle(300 + Math.cos(a)*40, 300 + Math.sin(a)*40, 19, { label: label, restitution: 0.4, density: 0.01, render: { fillStyle: i%2===0 ? '#fdfdfd' : '#222' } }));
        }
        // Outer Circle
        for(let i=0; i<12; i++){
            const a = (i * 30) * (Math.PI / 180);
            let type = (i===0 || i===1 || i===4 || i===5 || i===8 || i===9) ? 'black' : 'white';
            coins.push(Bodies.circle(300 + Math.cos(a)*82, 300 + Math.sin(a)*82, 19, { label: type, restitution: 0.4, density: 0.01, render: { fillStyle: type === 'white' ? '#fdfdfd' : '#222' } }));
        }

        const pockets = [{x:40, y:40}, {x:560, y:40}, {x:40, y:558}, {x:560, y:558}].map(p => Bodies.circle(p.x, p.y, 25, { isStatic: true, isSensor: true }));
        Composite.add(engine.world, [striker, ...coins]);

        let canShoot = true, startPos = null, currentTouch = null;
        const slider = document.getElementById('strikerSlider');

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(pair => { 
                if(pair.bodyA.label === 'striker' || pair.bodyB.label === 'striker') { 
                    hitSound.currentTime=0; 
                    hitSound.play(); 
                } 
            });
        });

        slider.oninput = () => { if(canShoot) Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 480 }); };
        window.ontouchstart = (e) => { if(canShoot) startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
        window.ontouchmove = (e) => { if(canShoot) currentTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
        
        window.ontouchend = () => {
            if(canShoot && startPos && currentTouch) {
                const dx = startPos.x - currentTouch.x, dy = startPos.y - currentTouch.y;
                // POWERFUL BUT STABLE FORCE
                Matter.Body.applyForce(striker, striker.position, { x: dx * 0.0012, y: dy * 0.0012 });
                canShoot = false; startPos = null; currentTouch = null;
            }
        };

        function drawMarkings() {
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 2;
            ctx.strokeRect(95, 95, 410, 410);
            ctx.strokeRect(110, 110, 380, 380);
            ctx.beginPath(); ctx.arc(300, 300, 110, 0, Math.PI * 2); ctx.stroke();
            [102, 498].forEach(y => [102, 498].forEach(x => { ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.stroke(); }));
        }

        Events.on(render, 'afterRender', () => {
            drawMarkings();
            if (canShoot && startPos && currentTouch) {
                const dx = startPos.x - currentTouch.x, dy = startPos.y - currentTouch.y;
                ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(striker.position.x, striker.position.y);
                ctx.lineTo(striker.position.x + (dx * 6), striker.position.y + (dy * 6));
                ctx.strokeStyle = "rgba(255, 255, 255, 0.7)"; ctx.stroke(); ctx.setLineDash([]);
            }
        });

        Events.on(engine, 'afterUpdate', () => {
            coins.forEach((c, i) => {
                pockets.forEach(p => {
                    if (Vector.magnitude(Vector.sub(c.position, p.position)) < 26) {
                        scores[c.label]++;
                        document.getElementById(c.label + 'Score').innerText = scores[c.label];
                        Composite.remove(engine.world, c); coins.splice(i, 1);
                    }
                });
            });
            if (!canShoot && Composite.allBodies(engine.world).every(b => b.speed < 0.2)) {
                Matter.Body.setPosition(striker, { x: parseInt(slider.value), y: 480 });
                Matter.Body.setVelocity(striker, { x: 0, y: 0 }); canShoot = true;
            }
        });

        Render.run(render); Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
